  <head>
    <title>Georgia | Photography | Vijay Mathew</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../stylesheets/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../stylesheets/style.css">
    <script>
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);

    <style>
      .breadcrumb {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .breadcrumb a {
        border-bottom: none;
      }

      .gallery-header {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: end;
        margin-bottom: 2rem;
      }

      .gallery-header p {
        margin: 0;
      }

      .gallery-count {
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        font-size: 1rem;
        white-space: nowrap;
      }

      .gallery-section + .gallery-section {
        margin-top: 3rem;
      }

      .gallery-section .section-title {
        margin-top: 0;
      }

      .photo-wall {
        columns: 3 260px;
        column-gap: 1rem;
      }

      .photo-item {
        break-inside: avoid;
        margin: 0 0 1rem;
        display: block;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--card-bg) 88%, transparent);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
        transition: transform 0.2s ease, border-color 0.2s ease;
        border-bottom: none;
      }

      .photo-item:hover {
        transform: translateY(-3px);
        border-color: var(--nex-mint);
        border-bottom: none;
      }

      .photo-item img {
        display: block;
        width: 100%;
        height: auto;
      }

      .photo-caption {
        padding: 0.75rem 0.9rem 0.9rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .photo-caption code {
        font-size: 0.85rem;
      }

      @media (max-width: 768px) {
        .gallery-header {
          flex-direction: column;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="w3-content">
      <button class="theme-toggle" id="theme-toggle" title="Toggle Dark/Light Mode">
        <i class="fa fa-moon-o" id="theme-icon"></i>
      </button>

      <header class="w3-panel">
        <div class="breadcrumb">
          <a href="../../index.html">Home</a>
          <span>/</span>
          <a href="../index.html">Photography</a>
          <span>/</span>
          <span>Georgia</span>
        </div>
        <h1>Georgia</h1>
      </header>

      <main class="w3-row-padding">
        <section class="gallery-header">
          <p>This gallery contains the current Georgia image set. Click any photograph to open the full-size original.</p>
          <div class="gallery-count">130 photographs</div>
        </section>

        <section class="gallery-section" aria-labelledby="color-heading">
          <span class="section-title" id="color-heading">Color</span>
          <div class="photo-wall" id="color-wall"></div>
        </section>

        <section class="gallery-section" aria-labelledby="bw-heading">
          <span class="section-title" id="bw-heading">Monochrome</span>
          <div class="photo-wall" id="bw-wall"></div>

      function updateIcon(theme) {
        icon.className = theme === 'dark' ? 'fa fa-moon-o' : 'fa fa-sun-o';
      }

      updateIcon(document.documentElement.getAttribute('data-theme'));

      toggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateIcon(newTheme);
      });

      function renderWall(wallId, photos, label) {
        const wall = document.getElementById(wallId);

        photos.forEach((filename, index) => {
          const basename = filename.split('/').pop();
          const link = document.createElement('a');
          link.className = 'photo-item';
          link.href = `./images/${filename}`;
          link.target = '_blank';
          link.rel = 'noopener';
          link.setAttribute('aria-label', `Open ${label} photograph ${index + 1}`);

          const img = document.createElement('img');
          img.src = `./images/${filename}`;
          img.alt = `${label} photograph ${index + 1}`;
          img.loading = 'lazy';

          const caption = document.createElement('div');
          caption.className = 'photo-caption';
          caption.innerHTML = `<code>${basename}</code>`;

          link.appendChild(img);
          link.appendChild(caption);
          wall.appendChild(link);
        });
      }

      const colorImages = images.filter((filename) => filename.startsWith('color/'));
      const bwImages = images.filter((filename) => filename.startsWith('bw/'));

      renderWall('color-wall', colorImages, 'Georgia color');
      renderWall('bw-wall', bwImages, 'Georgia monochrome');
    </script>
