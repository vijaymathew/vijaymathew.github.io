<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Here — Photography — Vijay Mathew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../gallery-viewer.css">
  <style>
    :root {
      --paper:     #111213;
      --ink:       #e8e8ea;
      --ink-mid:   #a0a0a4;
      --ink-faint: #5a5a5e;
      --rule:      #272729;
      --accent:    #d4471a;
      --font-body: 'EB Garamond', Georgia, serif;
      --font-ui:   'Outfit', system-ui, sans-serif;
      --text-xs:   0.72rem;
      --text-sm:   0.85rem;
      --text-base: 1.175rem;
      --text-md:   1.32rem;
      --text-lg:   1.65rem;
      --text-xl:   2rem;
      --text-2xl:  2.8rem;
      --lh-body:   1.76;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body { background: var(--paper); color: var(--ink); font-family: var(--font-body); font-size: var(--text-base); line-height: var(--lh-body); }

    /* site header */
    .site-header { border-bottom: 1px solid var(--rule); padding: 1.1rem 2rem; }
    .site-header-inner { max-width: 56rem; margin: 0 auto; display: flex; align-items: baseline; gap: 2rem; flex-wrap: wrap; }
    a.site-name { font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 500; letter-spacing: 0.02em; color: var(--ink); text-decoration: none; }
    a.site-name:hover { color: var(--ink-mid); }
    .site-nav { display: flex; gap: 1.5rem; margin-left: auto; }
    .site-nav a { font-family: var(--font-ui); font-size: var(--text-xs); font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-faint); text-decoration: none; transition: color 0.15s; }
    .site-nav a:hover { color: var(--ink); }

    /* page */
    .page { max-width: 56rem; margin: 0 auto; padding: 4rem 2rem 6rem; }

    /* gallery header */
    .gallery-header { display: flex; justify-content: space-between; gap: 2rem; align-items: baseline; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--rule); flex-wrap: wrap; }
    .gallery-header p { font-size: var(--text-md); color: var(--ink-mid); line-height: 1.55; max-width: 52ch; margin: 0.6rem 0 0; }
    h1 { font-family: var(--font-body); font-size: var(--text-2xl); font-weight: 400; line-height: 1.1; letter-spacing: -0.01em; color: var(--ink); }
    .gallery-count { font-family: var(--font-ui); font-size: var(--text-xs); letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); white-space: nowrap; align-self: flex-start; padding-top: 0.35rem; }

    /* sections */
    .gallery-section + .gallery-section { margin-top: 3rem; }
    section + section { margin-top: 3rem; }
    .section-title { display: block; font-family: var(--font-ui); font-size: var(--text-xs); font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 1.25rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--rule); }

    /* photo wall */
    .photo-wall { columns: 3 240px; column-gap: 0.65rem; }
    .photo-item { break-inside: avoid; margin: 0 0 0.65rem; display: block; overflow: hidden; border: 1px solid var(--rule); transition: border-color 0.15s; cursor: pointer; }
    .photo-item:hover { border-color: var(--ink-faint); }
    .photo-item img { display: block; width: 100%; height: auto; }
    .photo-caption { padding: 0.5rem 0.65rem 0.65rem; font-family: var(--font-ui); font-size: var(--text-xs); color: var(--ink-faint); }

    @media (max-width: 640px) {
      .page { padding: 3rem 1.25rem 5rem; }
      .site-header { padding: 1rem 1.25rem; }
      .site-nav { display: none; }
      .photo-wall { columns: 1; }
      .gallery-header { flex-direction: column; align-items: flex-start; }
      h1 { font-size: var(--text-xl); }
    }
  </style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a class="site-name" href="../../index.html">Photography</a>
    <nav class="site-nav">
      <a href="../../../index.html">Home</a>
    </nav>
  </div>
</header>
<div class="page">
  <div class="gallery-header">
    <div>
      <h1>Here</h1>
      <p>Every-day life appears here in the small doings of streets and thresholds, in the gestures by which people occupy an immediate world and carry it forward.</p>
    </div>
    <div class="gallery-count">16 photographs</div>
  </div>
<section aria-labelledby="color-heading" class="gallery-section">
<span class="section-title" id="color-heading">Color</span>
<div class="photo-wall" id="color-wall"></div>
</section>
<section aria-labelledby="bw-heading" class="gallery-section">
<span class="section-title" id="bw-heading">Monochrome</span>
<div class="photo-wall" id="bw-wall"></div>
</section>
</div>
<script>
const images = [
        "color/01022024_35.webp",
        "color/16012026_06.webp",
        "color/07072025_03.webp",
        "color/07102025_01.webp",
        "color/08042026_04.webp",
        "color/09082025_02.webp",
        "color/09102025_03.webp",
        "color/09102025_05.webp",
        "color/12082025_01.webp",
        "color/27062024_06.webp",
        "color/27092022_23.webp",
        "bw/30032026_02.webp",
        "bw/06092025_12.webp",
        "bw/30032026_01.webp",
        "bw/06092025_08.webp",
        "bw/18052026_40.webp"
      ];


      function createPhotoItem(filename, index, label) {
        const link = document.createElement('a');
        link.className = 'photo-item';
        link.href = `./images/${filename}`;
        link.target = '_blank';
        link.rel = 'noopener';
        link.setAttribute('aria-label', `Open ${label} photograph ${index + 1}`);

        const img = document.createElement('img');
        img.src = `./images/${filename}`;
        img.alt = `${label} photograph ${index + 1}`;
        img.loading = index < 4 ? 'eager' : 'lazy';
        img.decoding = 'async';

        if (index < 4) {
          img.fetchPriority = 'high';
        }

        link.appendChild(img);
        return link;
      }

      function renderWall(wallId, photos, label) {
        const wall = document.getElementById(wallId);
        const initialCount = Math.min(10, photos.length);
        const batchSize = 12;

        function appendBatch(start, end) {
          const fragment = document.createDocumentFragment();

          for (let index = start; index < end; index += 1) {
            fragment.appendChild(createPhotoItem(photos[index], index, label));
          }

          wall.appendChild(fragment);
        }

        function scheduleRemaining(startIndex) {
          if (startIndex >= photos.length) {
            return;
          }

          const schedule = window.requestIdleCallback
            ? (callback) => window.requestIdleCallback(callback, { timeout: 250 })
            : (callback) => window.setTimeout(callback, 0);

          schedule(() => {
            const endIndex = Math.min(startIndex + batchSize, photos.length);
            appendBatch(startIndex, endIndex);
            scheduleRemaining(endIndex);
          });
        }

        appendBatch(0, initialCount);

        if (initialCount < photos.length) {
          window.requestAnimationFrame(() => {
            scheduleRemaining(initialCount);
          });
        }
      }

      const colorImages = images.filter((filename) => filename.startsWith('color/'));
      const bwImages = images.filter((filename) => filename.startsWith('bw/'));

      renderWall('color-wall', colorImages, 'Here color');
      renderWall('bw-wall', bwImages, 'Here monochrome');
</script>
<script src="../../gallery-viewer.js"></script>
<script>
initializeGalleryViewer({ galleryName: 'Here' });
</script>
</body>
</html>
