<!DOCTYPE html>
<html>
  <head>
    <title>Polaroids | Photography | Vijay Mathew</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../../stylesheets/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../../stylesheets/style.css">
    <link rel="stylesheet" href="../../gallery-viewer.css">
    <script>
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
      .breadcrumb {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .breadcrumb a {
        border-bottom: none;
      }

      .gallery-header {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: end;
        margin-bottom: 2rem;
      }

      .gallery-header p {
        margin: 0;
        max-width: 64ch;
      }

      .gallery-count {
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        font-size: 1rem;
        white-space: nowrap;
      }

      .photo-wall {
        columns: 3 280px;
        column-gap: 1rem;
      }

      .photo-item {
        break-inside: avoid;
        margin: 0 0 1rem;
        display: block;
        border-radius: 6px;
        overflow: hidden;
        background: transparent;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border-bottom: none;
      }

      .photo-item:hover {
        transform: translateY(-3px) rotate(-0.2deg);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
        border-bottom: none;
      }

      .photo-item img {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 768px) {
        .gallery-header {
          flex-direction: column;
          align-items: start;
        }

        .photo-wall {
          columns: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="w3-content">
      <button class="theme-toggle" id="theme-toggle" title="Toggle Dark/Light Mode">
        <i class="fa fa-moon-o" id="theme-icon"></i>
      </button>

      <header class="w3-panel">
        <div class="breadcrumb">
          <a href="../../../index.html">Home</a>
          <span>/</span>
          <a href="../../index.html">Photography</a>
          <span>/</span>
          <span>Polaroids</span>
        </div>
        <h1>Polaroids</h1>
      </header>

      <main class="w3-row-padding">
        <section class="gallery-header">
          <p>A small set of square frames in the polaroid manner — leaves, signs, shutters, and the off-hand vernacular of the road, kept in their borders as found.</p>
          <div class="gallery-count">13 photographs</div>
        </section>

        <section aria-label="Polaroid photographs">
          <div class="photo-wall" id="photo-wall"></div>
        </section>
      </main>
    </div>

    <script>
      const toggleBtn = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      const images = [
        "30042026_03.jpg",
        "30042026_06.jpg",
        "30042026_25.jpg",
        "05052026_05.jpg",
        "05052026_01.jpg",
        "05052026_03.jpg",
        "05052026_02.jpg",
        "05052026_10.jpg",
        "05052026_11.jpg",
        "05052026_08.jpg",
        "30042026_13.jpg",
        "01052026_01.jpg",
        "30042026_09.jpg"
      ];

      function updateIcon(theme) {
        icon.className = theme === 'dark' ? 'fa fa-moon-o' : 'fa fa-sun-o';
      }

      updateIcon(document.documentElement.getAttribute('data-theme'));

      toggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateIcon(newTheme);
      });

      function createPhotoItem(filename, index) {
        const link = document.createElement('a');
        link.className = 'photo-item';
        link.href = `./images/${filename}`;
        link.target = '_blank';
        link.rel = 'noopener';
        link.setAttribute('aria-label', `Open polaroid ${index + 1}`);

        const img = document.createElement('img');
        img.src = `./images/${filename}`;
        img.alt = `Polaroid ${index + 1}`;
        img.loading = index < 4 ? 'eager' : 'lazy';
        img.decoding = 'async';

        if (index < 4) {
          img.fetchPriority = 'high';
        }

        link.appendChild(img);
        return link;
      }

      const wall = document.getElementById('photo-wall');
      const fragment = document.createDocumentFragment();
      images.forEach((filename, index) => {
        fragment.appendChild(createPhotoItem(filename, index));
      });
      wall.appendChild(fragment);
    </script>
    <script src="../../gallery-viewer.js"></script>
    <script>
      initializeGalleryViewer({ galleryName: 'Polaroids' });
    </script>
  </body>
</html>
