<!DOCTYPE html>
<html>
  <head>
    <title>Signs | Photography | Vijay Mathew</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../stylesheets/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../stylesheets/style.css">
    <script>
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
      .breadcrumb {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .breadcrumb a {
        border-bottom: none;
      }

      .gallery-header {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: end;
        margin-bottom: 2rem;
      }

      .gallery-header p {
        margin: 0;
      }

      .gallery-count {
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        font-size: 1rem;
        white-space: nowrap;
      }

      .gallery-section .section-title {
        margin-top: 0;
      }

      .photo-wall {
        columns: 3 260px;
        column-gap: 1rem;
      }

      .photo-item {
        break-inside: avoid;
        margin: 0 0 1rem;
        display: block;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--card-bg) 88%, transparent);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
        transition: transform 0.2s ease, border-color 0.2s ease;
        border-bottom: none;
      }

      .photo-item:hover {
        transform: translateY(-3px);
        border-color: var(--nex-mint);
        border-bottom: none;
      }

      .photo-item img {
        display: block;
        width: 100%;
        height: auto;
      }

      .photo-caption {
        padding: 0.75rem 0.9rem 0.9rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .photo-caption code {
        font-size: 0.85rem;
      }

      @media (max-width: 768px) {
        .gallery-header {
          flex-direction: column;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="w3-content">
      <button class="theme-toggle" id="theme-toggle" title="Toggle Dark/Light Mode">
        <i class="fa fa-moon-o" id="theme-icon"></i>
      </button>

      <header class="w3-panel">
        <div class="breadcrumb">
          <a href="../../index.html">Home</a>
          <span>/</span>
          <a href="../index.html">Photography</a>
          <span>/</span>
          <span>Signs</span>
        </div>
        <h1>Signs</h1>
      </header>

      <main class="w3-row-padding">
        <section class="gallery-header">
          <p>Street-side language gathers here in painted boards, fading notices, hand-made instructions, and the small visual claims by which a place speaks to itself.</p>
          <div class="gallery-count">45 photographs</div>
        </section>

        <section class="gallery-section" aria-labelledby="color-heading">
          <span class="section-title" id="color-heading">Color</span>
          <div class="photo-wall" id="color-wall"></div>
        </section>
      </main>
    </div>

    <script>
      const toggleBtn = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      const images = [
        "color/01012026_04.jpg",
        "color/01012026_19.jpg",
        "color/01062022_01.jpg",
        "color/01082024_04.jpg",
        "color/01082024_06.jpg",
        "color/02012026_03.jpg",
        "color/02072024_01.jpg",
        "color/02072025_08.jpg",
        "color/02072025_09.jpg",
        "color/02082022_05.jpg",
        "color/03092025_01.jpg",
        "color/04072025_06.jpg",
        "color/05082025_02.jpg",
        "color/05082025_04.jpg",
        "color/05092023_03.jpg",
        "color/05092023_05.jpg",
        "color/05102022_24.jpg",
        "color/05102022_28.jpg",
        "color/05102023_02.jpg",
        "color/05112025_01.jpg",
        "color/06072025_03.jpg",
        "color/07072025_10.jpg",
        "color/13062025_25.jpg",
        "color/13062025_29.jpg",
        "color/13072023_01.jpg",
        "color/14082025_06.jpg",
        "color/16072025_04.jpg",
        "color/16102023_21.jpg",
        "color/17042026_06.jpg",
        "color/18022026_13.jpg",
        "color/18032024_01.jpg",
        "color/18032024_03.jpg",
        "color/18062024_02.jpg",
        "color/18082025_03.jpg",
        "color/19012024_01.jpg",
        "color/22072022_12.jpg",
        "color/23112023_25.jpg",
        "color/24072025_03.jpg",
        "color/27012022_02.jpg",
        "color/27062025_06.jpg",
        "color/28062024_03.jpg",
        "color/28072022_01.jpg",
        "color/29052025_14.jpg",
        "color/31012026_05.jpg",
        "color/31012026_06.jpg",
        "color/27042026_01.jpg"
      ];

      function updateIcon(theme) {
        icon.className = theme === 'dark' ? 'fa fa-moon-o' : 'fa fa-sun-o';
      }

      updateIcon(document.documentElement.getAttribute('data-theme'));

      toggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateIcon(newTheme);
      });

      function renderWall(wallId, photos, label) {
        const wall = document.getElementById(wallId);

        photos.forEach((filename, index) => {
          const basename = filename.split('/').pop();
          const link = document.createElement('a');
          link.className = 'photo-item';
          link.href = `./images/${filename}`;
          link.target = '_blank';
          link.rel = 'noopener';
          link.setAttribute('aria-label', `Open ${label} photograph ${index + 1}`);

          const img = document.createElement('img');
          img.src = `./images/${filename}`;
          img.alt = `${label} photograph ${index + 1}`;
          img.loading = 'lazy';

          const caption = document.createElement('div');
          caption.className = 'photo-caption';
          caption.innerHTML = `<code>${basename}</code>`;

          link.appendChild(img);
          link.appendChild(caption);
          wall.appendChild(link);
        });
      }

      renderWall('color-wall', images, 'Signs color');
    </script>
  </body>
</html>
