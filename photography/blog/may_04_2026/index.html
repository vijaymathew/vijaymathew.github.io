<!DOCTYPE html>
<html>
  <head>
    <title>4 May 2026 | Wayside | Photography | Vijay Mathew</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../../stylesheets/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../../stylesheets/style.css">
    <link rel="stylesheet" href="../../gallery-viewer.css">
    <script>
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
      .breadcrumb {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .breadcrumb a {
        border-bottom: none;
      }

      .entry-eyebrow {
        display: inline-block;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--nex-gold);
        margin-bottom: 0.5rem;
      }

      [data-theme="light"] .entry-eyebrow {
        color: var(--nex-blue);
      }

      .entry-header h1 {
        margin-top: 0.1rem;
      }

      .entry-prose {
        max-width: 64ch;
        color: var(--text);
        margin: 0 0 2.25rem;
      }

      .entry-prose p {
        margin: 0 0 0.9rem;
      }

      .photo-wall {
        columns: 3 280px;
        column-gap: 1.25rem;
      }

      .photo-item {
        break-inside: avoid;
        margin: 0 0 1.25rem;
        display: block;
        padding: 0.55rem 0.55rem 0.7rem;
        background: color-mix(in srgb, var(--card-bg) 92%, transparent);
        border: 1px solid var(--line);
        border-radius: 6px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        transition: transform 0.2s ease, border-color 0.2s ease;
        border-bottom: 1px solid var(--line);
      }

      .photo-item:hover {
        transform: translateY(-3px) rotate(-0.15deg);
        border-color: var(--nex-mint);
        border-bottom: 1px solid var(--nex-mint);
      }

      .photo-item img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 2px;
      }

      .entry-footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        font-family: "Space Grotesk", sans-serif;
      }

      .entry-footer a {
        color: var(--text);
        border-bottom: none;
      }

      @media (max-width: 768px) {
        .photo-wall {
          columns: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="w3-content">
      <button class="theme-toggle" id="theme-toggle" title="Toggle Dark/Light Mode">
        <i class="fa fa-moon-o" id="theme-icon"></i>
      </button>

      <header class="w3-panel">
        <div class="breadcrumb">
          <a href="../../../index.html">Home</a>
          <span>/</span>
          <a href="../../index.html">Photography</a>
          <span>/</span>
          <a href="../../index.html#wayside">Wayside</a>
          <span>/</span>
          <span>4 May 2026</span>
        </div>
        <div class="entry-header">
          <span class="entry-eyebrow">4 May 2026</span>
          <h1>An afternoon walk</h1>
        </div>
      </header>

      <main class="w3-row-padding">
        <section class="entry-prose">
          <!-- optional notes; leave empty if none -->
        </section>

        <section aria-label="Photographs">
          <div class="photo-wall" id="photo-wall"></div>
        </section>

        <footer class="entry-footer">
          <a href="../../index.html#wayside"><i class="fa fa-long-arrow-left" aria-hidden="true"></i> Back to Wayside</a>
        </footer>
      </main>
    </div>

    <script>
      const toggleBtn = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      const images = [
        "01.jpg",
        "02.jpg",
        "03.jpg",
        "04.jpg",
        "05.jpg",
        "06.jpg",
        "07.jpg",
        "08.jpg",
        "09.jpg"
      ];

      function updateIcon(theme) {
        icon.className = theme === 'dark' ? 'fa fa-moon-o' : 'fa fa-sun-o';
      }

      updateIcon(document.documentElement.getAttribute('data-theme'));

      toggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateIcon(newTheme);
      });

      function createPhotoItem(filename, index) {
        const link = document.createElement('a');
        link.className = 'photo-item';
        link.href = `./images/${filename}`;
        link.target = '_blank';
        link.rel = 'noopener';
        link.setAttribute('aria-label', `Open photograph ${index + 1}`);

        const img = document.createElement('img');
        img.src = `./images/${filename}`;
        img.alt = `Photograph ${index + 1}`;
        img.loading = index < 4 ? 'eager' : 'lazy';
        img.decoding = 'async';

        if (index < 4) {
          img.fetchPriority = 'high';
        }

        link.appendChild(img);
        return link;
      }

      const wall = document.getElementById('photo-wall');
      const fragment = document.createDocumentFragment();
      images.forEach((filename, index) => {
        fragment.appendChild(createPhotoItem(filename, index));
      });
      wall.appendChild(fragment);
    </script>
    <script src="../../gallery-viewer.js"></script>
    <script>
      initializeGalleryViewer({ galleryName: 'Wayside — 4 May 2026' });
    </script>
  </body>
</html>
