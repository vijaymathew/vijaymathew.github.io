  <body>
    <h2>is_empty</h2>

    <div class="prog">
      <pre><code>
is_empty(xs)
      </code></pre>
    </div>

    <p>Return <code><span class="pw">true</span></code> if <code>xs</code> is the empty list, return <code><span class="pw">false</span></code>
      if <code>xs</code> is anything else.</p>
    
    <h3>Examples:</h3>
    
    <div class="prog">
      <pre><code>
is_empty([1, 2, 3])
<span class="comment">// false</span>

is_empty([])
<span class="comment">// true</span>

is_empty("hello")
<span class="comment">// false</span>
      </code></pre>
    </div>
