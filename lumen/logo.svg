<svg xmlns="http://www.w3.org/2000/svg" width="470" height="150" viewBox="0 0 470 150" fill="none" role="img" aria-label="Lumen">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a8cf0"/>
      <stop offset="1" stop-color="#4b3fa8"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a8cf0"/>
      <stop offset="1" stop-color="#5b4bc4"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: violet tile + glowing "lumen" orb framed by a lens ring -->
  <g transform="translate(15,15)">
    <rect x="0" y="0" width="120" height="120" rx="27" ry="27" fill="url(#tile)"/>
    <circle cx="60" cy="60" r="36" fill="url(#orb)"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#ffffff" stroke-opacity="0.92" stroke-width="7"/>
  </g>

  <!-- Wordmark -->
  <text x="162" y="103" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="86" font-weight="700" letter-spacing="1.5" fill="url(#word)">Lumen</text>
</svg>
