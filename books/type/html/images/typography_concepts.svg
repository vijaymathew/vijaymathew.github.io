<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img">
  <title>Typography concepts</title>
  <desc>Letterforms with horizontal guide lines showing baseline, x-height, ascender line, cap height, descender line, and body height bracket.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#ffffff"/>

  <!--
    Georgia at 160px, baseline at y=340:
    Cap height  ≈ 116px above baseline  → y = 224
    Ascender    ≈ 128px above baseline  → y = 212  (b, d, h reach here)
    x-height    ≈  78px above baseline  → y = 262
    Baseline                            → y = 340
    Descender   ≈  38px below baseline  → y = 378
  -->

  <!-- Zone: body height shaded band -->
  <rect x="148" y="212" width="430" height="166" fill="#f5f5f0" rx="4"/>

  <!-- Guide lines — left edge x=148, right edge x=578 -->

  <!-- Cap height -->
  <line x1="148" y1="228" x2="578" y2="228" stroke="#854F0B" stroke-width="1" stroke-dasharray="6 3"/>
  <!-- Ascender line -->
  <line x1="148" y1="212" x2="578" y2="212" stroke="#185FA5" stroke-width="0.75" stroke-dasharray="4 3"/>
  <!-- x-height -->
  <line x1="148" y1="262" x2="578" y2="262" stroke="#0F6E56" stroke-width="0.75" stroke-dasharray="4 3"/>
  <!-- Baseline -->
  <line x1="148" y1="340" x2="578" y2="340" stroke="#222222" stroke-width="1.4"/>
  <!-- Descender -->
  <line x1="148" y1="378" x2="578" y2="378" stroke="#A32D2D" stroke-width="0.75" stroke-dasharray="4 3"/>

  <!-- Letters: 5 slots across x=148..578, slot width=86, centers at 191,277,363,449,535 -->
  <!-- b — ascender -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="160" fill="#222222" opacity="0.88"
        x="148" y="340" dominant-baseline="auto">b</text>
  <!-- x — x-height ref -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="160" fill="#222222" opacity="0.88"
        x="242" y="340" dominant-baseline="auto">x</text>
  <!-- p — descender -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="160" fill="#A32D2D" opacity="0.82"
        x="325" y="340" dominant-baseline="auto">p</text>
  <!-- H — cap height -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="160" fill="#854F0B" opacity="0.85"
        x="400" y="340" dominant-baseline="auto">H</text>
  <!-- g — descender -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="160" fill="#A32D2D" opacity="0.82"
        x="515" y="340" dominant-baseline="auto">g</text>

  <!-- RIGHT-SIDE LABELS with tick marks -->
  <!-- Cap height -->
  <line x1="578" y1="224" x2="592" y2="224" stroke="#854F0B" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="12" fill="#854F0B" font-weight="500" x="596" y="228">Cap height</text>
  <!-- Ascender line -->
  <line x1="578" y1="212" x2="592" y2="212" stroke="#185FA5" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="12" fill="#185FA5" font-weight="500" x="596" y="208">Ascender line</text>
  <!-- x-height -->
  <line x1="578" y1="262" x2="592" y2="262" stroke="#0F6E56" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" font-weight="500" x="596" y="266">x-height</text>
  <!-- Baseline -->
  <line x1="578" y1="340" x2="592" y2="340" stroke="#444444" stroke-width="1.2"/>
  <text font-family="sans-serif" font-size="12" fill="#222222" font-weight="500" x="596" y="344">Baseline</text>
  <!-- Descender -->
  <line x1="578" y1="378" x2="592" y2="378" stroke="#A32D2D" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="12" fill="#A32D2D" font-weight="500" x="596" y="382">Descender line</text>

  <!-- LEFT SIDE: zone bracket labels, all horizontal, stacked -->
  <!-- We use small bracket lines + horizontal text to the left of x=148 -->

  <!-- Ascender zone bracket: y=212 to y=340, midpoint=276 -->
  <line x1="112" y1="214" x2="112" y2="338" stroke="#185FA5" stroke-width="1"
        marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="112" y1="212" x2="120" y2="212" stroke="#185FA5" stroke-width="0.8"/>
  <line x1="112" y1="340" x2="120" y2="340" stroke="#185FA5" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="11" fill="#185FA5" text-anchor="middle" x="75" y="272">Ascender</text>
  <text font-family="sans-serif" font-size="11" fill="#185FA5" text-anchor="middle" x="75" y="285">zone</text>

  <!-- x-height zone bracket: y=262 to y=340, midpoint=301 -->
  <line x1="130" y1="264" x2="130" y2="338" stroke="#0F6E56" stroke-width="1"
        marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="130" y1="262" x2="138" y2="262" stroke="#0F6E56" stroke-width="0.8"/>
  <line x1="130" y1="340" x2="138" y2="340" stroke="#0F6E56" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="11" fill="#0F6E56" text-anchor="middle" x="75" y="305">x-height</text>

  <!-- Descender zone bracket: y=340 to y=378, midpoint=359 -->
  <line x1="112" y1="342" x2="112" y2="376" stroke="#A32D2D" stroke-width="1"
        marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="112" y1="340" x2="120" y2="340" stroke="#A32D2D" stroke-width="0.8"/>
  <line x1="112" y1="378" x2="120" y2="378" stroke="#A32D2D" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="11" fill="#A32D2D" text-anchor="middle" x="75" y="356">Descender</text>
  <text font-family="sans-serif" font-size="11" fill="#A32D2D" text-anchor="middle" x="75" y="369">zone</text>

  <!-- Body height bracket: far right, y=212 to y=378 -->
  <line x1="756" y1="214" x2="756" y2="376" stroke="#888880" stroke-width="1" opacity="0.7"
        marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="748" y1="212" x2="764" y2="212" stroke="#888880" stroke-width="0.8" opacity="0.7"/>
  <line x1="748" y1="378" x2="764" y2="378" stroke="#888880" stroke-width="0.8" opacity="0.7"/>
  <text font-family="sans-serif" font-size="11" fill="#888780" font-weight="500" text-anchor="middle" x="756" y="292">Body</text>
  <text font-family="sans-serif" font-size="11" fill="#888780" font-weight="500" text-anchor="middle" x="756" y="305">height</text>

  <!-- Letter annotations above/below letters -->
  <!-- b: ascender label above -->
  <text font-family="sans-serif" font-size="11" fill="#185FA5" text-anchor="middle" x="185" y="200">ascender</text>
  <!-- x: x-height ref label above -->
  <text font-family="sans-serif" font-size="11" fill="#0F6E56" text-anchor="middle" x="272" y="251">x-height ref</text>
  <!-- p: descender label below -->
  <text font-family="sans-serif" font-size="11" fill="#A32D2D" text-anchor="middle" x="358" y="395">descender</text>
  <!-- H: cap height label above -->
  <text font-family="sans-serif" font-size="11" fill="#854F0B" text-anchor="middle" x="448" y="212">cap height</text>
  <!-- g: descender label below -->
  <text font-family="sans-serif" font-size="11" fill="#A32D2D" text-anchor="middle" x="546" y="395">descender</text>

  <!-- Footer -->
  <text font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle" font-weight="500"
        x="400" y="470">baseline · x-height · ascenders · descenders · cap height · body height</text>
</svg>
