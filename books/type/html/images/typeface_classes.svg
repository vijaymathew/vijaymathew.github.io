<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img">
  <title>Illustrative classes of typefaces</title>
  <desc>A six-panel comparison showing humanist, transitional, didone, slab-serif, sans-serif, and display typeface classes using the same sample letters.</desc>

  <rect width="800" height="520" fill="#ffffff"/>

  <text x="400" y="34"
        text-anchor="middle"
        font-family="sans-serif"
        font-size="18"
        font-weight="600"
        fill="#222222">Illustrative Typeface Classes</text>
  <text x="400" y="54"
        text-anchor="middle"
        font-family="sans-serif"
        font-size="11"
        font-weight="500"
        fill="#888780">same specimen letters, different historical classes</text>

  <!-- Humanist -->
  <g transform="translate(36 76)">
    <rect width="228" height="188" rx="8" fill="#f8f5ef" stroke="#e4ddd1"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#854F0B">Humanist</text>
    <text x="18" y="44" font-family="sans-serif" font-size="11" fill="#666666">diagonal stress, bracketed serifs</text>
    <line x1="18" y1="138" x2="210" y2="138" stroke="#d7d2c8" stroke-width="1"/>
    <text x="38" y="134"
          font-family="Palatino Linotype, Book Antiqua, URW Palladio L, Georgia, serif"
          font-size="104"
          fill="#222222"
          opacity="0.92">Ag</text>
    <text x="18" y="176" font-family="sans-serif" font-size="11" font-weight="500" fill="#0F6E56">Renaissance-derived, warm texture</text>
  </g>

  <!-- Transitional -->
  <g transform="translate(286 76)">
    <rect width="228" height="188" rx="8" fill="#fbf7f2" stroke="#e4ddd1"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#185FA5">Transitional</text>
    <text x="18" y="44" font-family="sans-serif" font-size="11" fill="#666666">more vertical stress, sharper contrast</text>
    <line x1="18" y1="138" x2="210" y2="138" stroke="#d7d2c8" stroke-width="1"/>
    <text x="42" y="134"
          font-family="Baskerville, Baskerville Old Face, Times New Roman, serif"
          font-size="104"
          fill="#222222"
          opacity="0.92">Ag</text>
    <text x="18" y="176" font-family="sans-serif" font-size="11" font-weight="500" fill="#185FA5">refined, neutral body-text voice</text>
  </g>

  <!-- Didone -->
  <g transform="translate(536 76)">
    <rect width="228" height="188" rx="8" fill="#fcf8f5" stroke="#e4ddd1"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#A32D2D">Didone</text>
    <text x="18" y="44" font-family="sans-serif" font-size="11" fill="#666666">vertical stress, hairline serifs</text>
    <line x1="18" y1="138" x2="210" y2="138" stroke="#d7d2c8" stroke-width="1"/>
    <text x="52" y="134"
          font-family="Didot, Bodoni MT, Bodoni 72, Times New Roman, serif"
          font-size="106"
          fill="#222222"
          opacity="0.92">Ag</text>
    <text x="18" y="176" font-family="sans-serif" font-size="11" font-weight="500" fill="#A32D2D">high contrast, display-oriented</text>
  </g>

  <!-- Slab-serif -->
  <g transform="translate(36 286)">
    <rect width="228" height="188" rx="8" fill="#f7f3ee" stroke="#e4ddd1"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#8B5A2B">Slab-serif</text>
    <text x="18" y="44" font-family="sans-serif" font-size="11" fill="#666666">heavy unbracketed serifs</text>
    <line x1="18" y1="138" x2="210" y2="138" stroke="#d7d2c8" stroke-width="1"/>
    <text x="34" y="134"
          font-family="Rockwell, Clarendon, Courier New, serif"
          font-size="98"
          fill="#222222"
          opacity="0.92">Ag</text>
    <text x="18" y="176" font-family="sans-serif" font-size="11" font-weight="500" fill="#8B5A2B">sturdy, emphatic, poster lineage</text>
  </g>

  <!-- Sans-serif -->
  <g transform="translate(286 286)">
    <rect width="228" height="188" rx="8" fill="#f6f8f6" stroke="#dfe5df"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#0F6E56">Sans-serif</text>
    <text x="18" y="44" font-family="sans-serif" font-size="11" fill="#666666">no serifs; cleaner stroke endings</text>
    <line x1="18" y1="138" x2="210" y2="138" stroke="#d7d2c8" stroke-width="1"/>
    <text x="40" y="134"
          font-family="Helvetica Neue, Helvetica, Arial, Gill Sans, sans-serif"
          font-size="102"
          fill="#222222"
          opacity="0.92">Ag</text>
    <text x="18" y="176" font-family="sans-serif" font-size="11" font-weight="500" fill="#0F6E56">grotesque, geometric, or humanist</text>
  </g>

  <!-- Display -->
  <g transform="translate(536 286)">
    <rect width="228" height="188" rx="8" fill="#faf5f1" stroke="#e7ddd5"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#7D3C98">Display</text>
    <text x="18" y="44" font-family="sans-serif" font-size="11" fill="#666666">decorative forms meant for large sizes</text>
    <line x1="18" y1="138" x2="210" y2="138" stroke="#d7d2c8" stroke-width="1"/>
    <text x="36" y="134"
          font-family="Brush Script MT, Snell Roundhand, Apple Chancery, cursive"
          font-size="102"
          fill="#222222"
          opacity="0.92">Ag</text>
    <text x="18" y="176" font-family="sans-serif" font-size="11" font-weight="500" fill="#7D3C98">expressive, not for running text</text>
  </g>

  <text x="400" y="502"
        text-anchor="middle"
        font-family="sans-serif"
        font-size="11"
        font-weight="500"
        fill="#888780">illustrative comparison only: exact appearance depends on available system fonts</text>
</svg>
