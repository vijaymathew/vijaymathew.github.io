<svg xmlns="http://www.w3.org/2000/svg" width="800" height="780" viewBox="0 0 800 780" role="img">
  <title>Tracking, kerning, and leading</title>
  <desc>A three-part diagram comparing tracking across words, kerning in the AV letter pair, and leading between lines of text.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="780" fill="#ffffff"/>

  <text x="400" y="34" text-anchor="middle"
        font-family="sans-serif" font-size="18" font-weight="600" fill="#222222">Spacing in Typography</text>
  <text x="400" y="54" text-anchor="middle"
        font-family="sans-serif" font-size="11" font-weight="500" fill="#888780">tracking adjusts all characters, kerning adjusts pairs, leading adjusts lines</text>

  <!-- Tracking panel -->
  <g transform="translate(32 82)">
    <rect width="736" height="210" rx="8" fill="#f8f5ef" stroke="#e4ddd1"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#854F0B">Tracking</text>
    <text x="18" y="40" font-family="sans-serif" font-size="11" fill="#666666">uniform spacing applied across an entire range of text</text>

    <line x1="24" y1="82" x2="712" y2="82" stroke="#e7dfd3" stroke-width="1"/>
    <line x1="24" y1="132" x2="712" y2="132" stroke="#e7dfd3" stroke-width="1"/>
    <line x1="24" y1="182" x2="712" y2="182" stroke="#e7dfd3" stroke-width="1"/>

    <text x="28" y="92" font-family="sans-serif" font-size="11" font-weight="500" fill="#666666">tight</text>
    <text x="28" y="142" font-family="sans-serif" font-size="11" font-weight="500" fill="#666666">default</text>
    <text x="28" y="192" font-family="sans-serif" font-size="11" font-weight="500" fill="#666666">loose</text>

    <text x="140" y="82"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="42"
          letter-spacing="-2.4"
          fill="#222222">Typography</text>

    <text x="140" y="133"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="42"
          fill="#222222">Typography</text>

    <text x="140" y="182"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="42"
          letter-spacing="3.6"
          fill="#222222">Typography</text>
  </g>

  <!-- Kerning panel -->
  <g transform="translate(32 302)">
    <rect width="736" height="150" rx="8" fill="#f6f8f6" stroke="#dfe5df"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#0F6E56">Kerning</text>
    <text x="18" y="44" font-family="sans-serif" font-size="11" fill="#666666">pair-specific adjustment that fixes awkward gaps between letter shapes</text>

    <text x="15" y="92" font-family="sans-serif" font-size="11" font-weight="500" fill="#666666">without kerning</text>
    <text x="390" y="92" font-family="sans-serif" font-size="11" font-weight="500" fill="#666666">with kerning</text>

    <text x="88" y="130"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="86"
          letter-spacing="8"
          fill="#222222">AV</text>
    <line x1="104" y1="116" x2="212" y2="116" stroke="#A32D2D" stroke-width="1.2"/>
    <line x1="152" y1="68" x2="152" y2="118" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="202" y1="68" x2="202" y2="118" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="177" y="64" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#A32D2D">visible hole</text>

    <text x="450" y="130"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="86"
          letter-spacing="-6"
          fill="#222222">AV</text>
    <line x1="472" y1="116" x2="558" y2="116" stroke="#0F6E56" stroke-width="1.2"/>
    <line x1="505" y1="68" x2="505" y2="118" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="538" y1="68" x2="538" y2="118" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="522" y="64" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#0F6E56">balanced pair</text>
  </g>

  <!-- Leading panel -->
  <g transform="translate(32 460)">
    <rect width="736" height="284" rx="8" fill="#fbf7f2" stroke="#e4ddd1"/>
    <text x="18" y="26" font-family="sans-serif" font-size="13" font-weight="600" fill="#185FA5">Leading</text>
    <text x="18" y="44" font-family="sans-serif" font-size="11" fill="#666666">baseline-to-baseline distance between lines of text</text>

    <line x1="24" y1="88" x2="712" y2="88" stroke="#e7dfd3" stroke-width="1"/>
    <line x1="24" y1="152" x2="712" y2="152" stroke="#e7dfd3" stroke-width="1"/>
    <line x1="24" y1="216" x2="712" y2="216" stroke="#e7dfd3" stroke-width="1"/>

    <!-- tight -->
    <text x="26" y="98" font-family="sans-serif" font-size="11" font-weight="500" fill="#666666">tight</text>
    <text x="126" y="88"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20"
          fill="#222222">The quick brown fox</text>
    <text x="126" y="108"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20"
          fill="#222222">jumps over the dog</text>
    <line x1="98" y1="88" x2="116" y2="88" stroke="#A32D2D" stroke-width="1"/>
    <line x1="98" y1="108" x2="116" y2="108" stroke="#A32D2D" stroke-width="1"/>
    <line x1="106" y1="90" x2="106" y2="106" stroke="#A32D2D" stroke-width="1"
          marker-start="url(#arrow)" marker-end="url(#arrow)"/>

    <!-- comfortable -->
    <text x="26" y="162" font-family="sans-serif" font-size="11" font-weight="500" fill="#666666">comfortable</text>
    <text x="126" y="152"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20"
          fill="#222222">The quick brown fox</text>
    <text x="126" y="184"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20"
          fill="#222222">jumps over the dog</text>
    <line x1="98" y1="152" x2="116" y2="152" stroke="#185FA5" stroke-width="1"/>
    <line x1="98" y1="184" x2="116" y2="184" stroke="#185FA5" stroke-width="1"/>
    <line x1="106" y1="154" x2="106" y2="182" stroke="#185FA5" stroke-width="1"
          marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="360" y="176" font-family="sans-serif" font-size="11" font-weight="500" fill="#185FA5">typical body-text range</text>

    <!-- loose -->
    <text x="26" y="226" font-family="sans-serif" font-size="11" font-weight="500" fill="#666666">loose</text>
    <text x="126" y="217"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20"
          fill="#222222">The quick brown fox</text>
    <text x="126" y="260"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20"
          fill="#222222">jumps over the dog</text>
    <line x1="98" y1="218" x2="116" y2="218" stroke="#854F0B" stroke-width="1"/>
    <line x1="98" y1="262" x2="116" y2="262" stroke="#854F0B" stroke-width="1"/>
    <line x1="106" y1="220" x2="106" y2="260" stroke="#854F0B" stroke-width="1"
          marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  </g>
</svg>
