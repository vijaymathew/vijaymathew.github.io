<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img">
  <title>Stress in letterforms</title>
  <desc>Three lowercase o glyphs illustrating diagonal stress, vertical stress, and minimal contrast.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="#ffffff"/>

  <!-- Left: diagonal stress -->
  <text x="132" y="312"
        font-family="Palatino Linotype, Book Antiqua, Georgia, serif"
        font-size="250"
        font-style="italic"
        fill="#222222"
        opacity="0.92">o</text>
  <line x1="171" y1="176" x2="241" y2="324" stroke="#0F6E56" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="205" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#0F6E56">Diagonal stress</text>
  <line x1="205" y1="126" x2="205" y2="152" stroke="#0F6E56" stroke-width="1"/>

  <!-- Center: vertical stress -->
  <text x="362" y="312"
        font-family="Didot, Bodoni MT, Times New Roman, serif"
        font-size="250"
        fill="#222222"
        opacity="0.92">o</text>
  <line x1="430" y1="164" x2="430" y2="330" stroke="#854F0B" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="430" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#854F0B">Vertical stress</text>
  <line x1="430" y1="126" x2="430" y2="150" stroke="#854F0B" stroke-width="1"/>

  <!-- Right: minimal contrast -->
  <text x="594" y="312"
        font-family="Rockwell, Courier New, serif"
        font-size="250"
        fill="#222222"
        opacity="0.92">o</text>
  <line x1="638" y1="248" x2="712" y2="248" stroke="#777777" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="638" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#777777">Little variation</text>
  <line x1="638" y1="126" x2="638" y2="150" stroke="#777777" stroke-width="1"/>

  <!-- Baseline -->
  <line x1="96" y1="330" x2="730" y2="330" stroke="#d7d2c8" stroke-width="1"/>
  <text x="744" y="334" font-family="sans-serif" font-size="11" font-weight="500" fill="#888780">Baseline</text>

  <!-- Footer -->
  <text x="400" y="476"
        text-anchor="middle"
        font-family="sans-serif"
        font-size="12"
        font-weight="500"
        fill="#888780">stress: the axis of thick-to-thin variation</text>
</svg>
