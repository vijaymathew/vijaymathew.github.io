<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img">
  <title>Strokes of a letterform</title>
  <desc>A diagram of a serif lowercase b labeling the stem, bowl, serif, and counter.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="#ffffff"/>

  <!-- Central letterform -->
  <g transform="translate(0 4)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="420" fill="#222222" opacity="0.9"
          x="168" y="426">b</text>

    <!-- Baseline hint -->
    <line x1="154" y1="433" x2="440" y2="433" stroke="#d7d2c8" stroke-width="1"/>
  </g>

  <!-- Labels and callouts -->
  <g font-family="sans-serif" font-size="12" font-weight="500">
    <line x1="520" y1="176" x2="249" y2="176" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="530" y="180" fill="#854F0B">Stem</text>

    <line x1="518" y1="268" x2="352" y2="286" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="528" y="272" fill="#0F6E56">Bowl</text>

    <line x1="520" y1="344" x2="302" y2="322" stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="530" y="348" fill="#444444">Counter</text>

    <line x1="132" y1="468" x2="207" y2="438" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="74" y="472" fill="#A32D2D">Serif</text>
  </g>

  <!-- Caption -->
  <text font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle" font-weight="500"
        x="400" y="486">stem · bowl · serif · counter</text>
</svg>
