project:
  type: book
  output-dir: html

book:
  title: "The Well-Set Typographer"
  subtitle: "Typography, Typesetting, and Document Production from the Command Line"
  author: "Vijay Mathew"
  date: today
  date-format: "MMMM D, YYYY"
  chapters:
    - index.md
    - introduction.md
    - part: "Letters, Ink, and Pixels: A Foundation"
      chapters:
        - chapter_1.md
        - chapter_2.md
        - chapter_3.md
        - chapter_4.md
    - part: "Markdown as Source: The Modern Workflow"
      chapters:
        - chapter_5.md
        - chapter_6.md
        - chapter_7.md
        - chapter_8.md
        - chapter_9.md
        - chapter_10.md
    - part: "The Toolbox"
      chapters:
        - chapter_11.md
        - chapter_12.md
        - chapter_13.md
        - chapter_14.md
        - chapter_15.md
        - chapter_16.md
        - chapter_17.md
    - part: "Document Gallery: Real Examples"
      chapters:
        - chapter_18.md
        - chapter_19.md
        - chapter_20.md
        - chapter_21.md
        - chapter_22.md
    - part: "Craft and Refinement"
      chapters:
        - chapter_23.md
        - chapter_24.md
        - chapter_25.md
        - chapter_26.md
  appendices:
    - appendix_a.md
    - appendix_b.md
    - appendix_c.md
    - appendix_d.md
    - appendix_e.md

format:
  html:
    theme:
      light: [cosmo, ../nex-book.scss]
      dark: [darkly, ../nex-book.scss]
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    css: styles.css
    code-copy: true
    code-overflow: wrap
    include-after-body: includes/adjust-chapter-numbers.html
  pdf:
    output-file: the-well-set-typographer.pdf
    pdf-engine: lualatex
    documentclass: scrbook
    classoption:
      - twoside
      - openright
      - headings=normal
      - fontsize=11pt
      - DIV=12
      - BCOR=15mm
      - paper=6in:9in
    number-sections: true
    toc: true
    toc-depth: 2
    papersize: custom
    mainfont: "EB Garamond"
    mainfontoptions:
      - Numbers=OldStyle
      - Ligatures=Common
      - Contextuals=Alternate
    sansfont: "Source Sans 3"
    sansfontoptions:
      - Scale=MatchLowercase
      - Numbers=Lining
    monofont: "Inconsolatazi4"
    monofontoptions:
      - Scale=MatchLowercase
    include-in-header: includes/preamble.tex
    colorlinks: false
    link-citations: true
    keep-tex: false

crossref:
  chapters: true

execute:
  freeze: auto
