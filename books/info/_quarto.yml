project:
  type: book
  output-dir: html

book:
  title: "Bits That Matter"
  subtitle: "Information Theory for Programmers"
  author: "Vijay Mathew"
  date: today
  date-format: "MMMM D, YYYY"
  chapters:
    - index.md
    - introduction.md
    - part: "The Language of Uncertainty"
      chapters:
        - chapter_1.md
        - chapter_2.md
        - chapter_3.md
    - part: "Compression: Entropy in Action"
      chapters:
        - chapter_4.md
        - chapter_5.md
        - chapter_6.md
        - chapter_7.md
    - part: "Communication: Sending Information Reliably"
      chapters:
        - chapter_8.md
        - chapter_9.md
        - chapter_10.md
    - part: "Inference: Information as a Thinking Tool"
      chapters:
        - chapter_11.md
        - chapter_12.md
        - chapter_13.md
    - part: "Information Theory in the Wild"
      chapters:
        - chapter_14.md
        - chapter_15.md
        - chapter_16.md
        - chapter_17.md
  appendices:
    - appendix_a.md
    - appendix_b.md
    - appendix_c.md
    - appendix_d.md

format:
  html:
    theme:
      light: [cosmo, ../nex-book.scss]
      dark: [darkly, ../nex-book.scss]
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    css: styles.css
    code-copy: true
    code-overflow: wrap
    include-after-body: includes/adjust-chapter-numbers.html
  pdf:
    output-file: bits-that-matter.pdf
    pdf-engine: lualatex
    documentclass: scrbook
    classoption:
      - twoside
      - openright
      - headings=normal
      - fontsize=11pt
      - DIV=12
      - BCOR=15mm
      - paper=6in:9in
    number-sections: true
    toc: true
    toc-depth: 2
    papersize: custom
    mainfont: "EB Garamond"
    mainfontoptions:
      - Numbers=OldStyle
      - Ligatures=Common
      - Contextuals=Alternate
    sansfont: "Libertinus Sans"
    sansfontoptions:
      - Scale=MatchLowercase
      - Numbers=Lining
    monofont: "Libertinus Mono"
    monofontoptions:
      - Scale=MatchLowercase
    include-in-header: includes/preamble.tex
    colorlinks: false
    link-citations: true
    keep-tex: false

crossref:
  chapters: true

execute:
  freeze: auto
