<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" width="980" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Uniform distribution maximizes entropy</title>
  <desc id="desc">Five small bar charts over four outcomes comparing a uniform, slightly skewed, very skewed, almost certain, and certain distribution. The chart shows entropy dropping as probability mass concentrates on fewer outcomes.</desc>

  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .panel { fill: #ffffff; stroke: #d7e0ea; stroke-width: 1.5; rx: 14; }
      .bar { fill: #1f5f8b; }
      .bar-light { fill: #7fb3d5; }
      .axis { stroke: #475569; stroke-width: 1.5; }
      .grid { stroke: #e5eaf0; stroke-width: 1; }
      .label { font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif; font-size: 18px; fill: #1f2937; }
      .small { font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif; font-size: 12px; fill: #64748b; }
      .entropy { font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif; font-size: 17px; font-weight: 600; fill: #0f172a; }
      .accent { fill: #b91c1c; }
      .caption { font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif; font-size: 19px; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="620" rx="18" />

  <!-- Panel 1 -->
  <g transform="translate(30,40)">
    <rect class="panel" x="0" y="0" width="170" height="430" />
    <text class="label" x="85" y="34" text-anchor="middle">Uniform</text>
    <text class="entropy" x="85" y="60" text-anchor="middle">H = 2.0000 bits</text>
    <line class="grid" x1="28" y1="360" x2="142" y2="360"/>
    <line class="grid" x1="28" y1="280" x2="142" y2="280"/>
    <line class="grid" x1="28" y1="200" x2="142" y2="200"/>
    <line class="grid" x1="28" y1="120" x2="142" y2="120"/>
    <line class="axis" x1="28" y1="360" x2="142" y2="360"/>
    <rect class="bar" x="36" y="280" width="18" height="80"/>
    <rect class="bar" x="62" y="280" width="18" height="80"/>
    <rect class="bar" x="88" y="280" width="18" height="80"/>
    <rect class="bar" x="114" y="280" width="18" height="80"/>
    <text class="small" x="45" y="388" text-anchor="middle">1</text>
    <text class="small" x="71" y="388" text-anchor="middle">2</text>
    <text class="small" x="97" y="388" text-anchor="middle">3</text>
    <text class="small" x="123" y="388" text-anchor="middle">4</text>
    <text class="small" x="85" y="414" text-anchor="middle">all outcomes equally likely</text>
  </g>

  <!-- Panel 2 -->
  <g transform="translate(218,40)">
    <rect class="panel" x="0" y="0" width="170" height="430" />
    <text class="label" x="85" y="34" text-anchor="middle">Slightly skewed</text>
    <text class="entropy" x="85" y="60" text-anchor="middle">H = 1.8464 bits</text>
    <line class="grid" x1="28" y1="360" x2="142" y2="360"/>
    <line class="grid" x1="28" y1="280" x2="142" y2="280"/>
    <line class="grid" x1="28" y1="200" x2="142" y2="200"/>
    <line class="grid" x1="28" y1="120" x2="142" y2="120"/>
    <line class="axis" x1="28" y1="360" x2="142" y2="360"/>
    <rect class="bar" x="36" y="232" width="18" height="128"/>
    <rect class="bar-light" x="62" y="264" width="18" height="96"/>
    <rect class="bar-light" x="88" y="296" width="18" height="64"/>
    <rect class="bar-light" x="114" y="328" width="18" height="32"/>
    <text class="small" x="45" y="388" text-anchor="middle">1</text>
    <text class="small" x="71" y="388" text-anchor="middle">2</text>
    <text class="small" x="97" y="388" text-anchor="middle">3</text>
    <text class="small" x="123" y="388" text-anchor="middle">4</text>
    <text class="small" x="85" y="414" text-anchor="middle">a little mass begins to concentrate</text>
  </g>

  <!-- Panel 3 -->
  <g transform="translate(406,40)">
    <rect class="panel" x="0" y="0" width="170" height="430" />
    <text class="label" x="85" y="34" text-anchor="middle">Very skewed</text>
    <text class="entropy" x="85" y="60" text-anchor="middle">H = 1.3323 bits</text>
    <line class="grid" x1="28" y1="360" x2="142" y2="360"/>
    <line class="grid" x1="28" y1="280" x2="142" y2="280"/>
    <line class="grid" x1="28" y1="200" x2="142" y2="200"/>
    <line class="grid" x1="28" y1="120" x2="142" y2="120"/>
    <line class="axis" x1="28" y1="360" x2="142" y2="360"/>
    <rect class="bar" x="36" y="136" width="18" height="224"/>
    <rect class="bar-light" x="62" y="296" width="18" height="64"/>
    <rect class="bar-light" x="88" y="338" width="18" height="22.4"/>
    <rect class="bar-light" x="114" y="350.4" width="18" height="9.6"/>
    <text class="small" x="45" y="388" text-anchor="middle">1</text>
    <text class="small" x="71" y="388" text-anchor="middle">2</text>
    <text class="small" x="97" y="388" text-anchor="middle">3</text>
    <text class="small" x="123" y="388" text-anchor="middle">4</text>
    <text class="small" x="85" y="414" text-anchor="middle">one outcome starts to dominate</text>
  </g>

  <!-- Panel 4 -->
  <g transform="translate(594,40)">
    <rect class="panel" x="0" y="0" width="170" height="430" />
    <text class="label" x="85" y="34" text-anchor="middle">Almost certain</text>
    <line class="grid" x1="28" y1="360" x2="142" y2="360"/>
    <line class="grid" x1="28" y1="280" x2="142" y2="280"/>
    <line class="grid" x1="28" y1="200" x2="142" y2="200"/>
    <line class="grid" x1="28" y1="120" x2="142" y2="120"/>
    <line class="axis" x1="28" y1="360" x2="142" y2="360"/>
    <rect class="bar" x="36" y="49.6" width="18" height="310.4"/>
    <text class="entropy" x="85" y="60" text-anchor="middle">H = 0.2423 bits</text>    
    <rect class="bar-light" x="62" y="356.8" width="18" height="3.2"/>
    <rect class="bar-light" x="88" y="356.8" width="18" height="3.2"/>
    <rect class="bar-light" x="114" y="356.8" width="18" height="3.2"/>
    <text class="small" x="45" y="388" text-anchor="middle">1</text>
    <text class="small" x="71" y="388" text-anchor="middle">2</text>
    <text class="small" x="97" y="388" text-anchor="middle">3</text>
    <text class="small" x="123" y="388" text-anchor="middle">4</text>
    <text class="small" x="85" y="414" text-anchor="middle">almost no uncertainty remains</text>
  </g>

  <!-- Panel 5 -->
  <g transform="translate(782,40)">
    <rect class="panel" x="0" y="0" width="170" height="430" />
    <text class="label" x="85" y="34" text-anchor="middle">Certain</text>
    <line class="grid" x1="28" y1="360" x2="142" y2="360"/>
    <line class="grid" x1="28" y1="280" x2="142" y2="280"/>
    <line class="grid" x1="28" y1="200" x2="142" y2="200"/>
    <line class="grid" x1="28" y1="120" x2="142" y2="120"/>
    <line class="axis" x1="28" y1="360" x2="142" y2="360"/>
    <rect class="bar" x="36" y="40" width="18" height="320"/>
    <text class="entropy accent" x="85" y="60" text-anchor="middle">H = 0.0000 bits</text>    
    <rect class="bar-light" x="62" y="360" width="18" height="0"/>
    <rect class="bar-light" x="88" y="360" width="18" height="0"/>
    <rect class="bar-light" x="114" y="360" width="18" height="0"/>
    <text class="small" x="45" y="388" text-anchor="middle">1</text>
    <text class="small" x="71" y="388" text-anchor="middle">2</text>
    <text class="small" x="97" y="388" text-anchor="middle">3</text>
    <text class="small" x="123" y="388" text-anchor="middle">4</text>
    <text class="small" x="85" y="414" text-anchor="middle">one outcome is guaranteed</text>
  </g>

  <text class="caption" x="490" y="525" text-anchor="middle">As probability mass concentrates on fewer outcomes, entropy falls.</text>
  <text class="small" x="490" y="553" text-anchor="middle">The uniform distribution spreads uncertainty evenly across the whole support, so it reaches the maximum possible entropy.</text>
</svg>
