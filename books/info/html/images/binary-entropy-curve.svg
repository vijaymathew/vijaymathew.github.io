<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560" role="img" aria-labelledby="title desc">
  <title id="title">Binary entropy curve</title>
  <desc id="desc">A line chart of the binary entropy function H(p) for a biased coin. The curve is zero at p equals 0 and 1, symmetric around p equals 0.5, and peaks at 1 bit when p equals 0.5.</desc>

  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .grid { stroke: #d8e0ea; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2; }
      .curve { fill: none; stroke: #1f5f8b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #1f5f8b; stroke: #ffffff; stroke-width: 2; }
      .peak { fill: #b91c1c; stroke: #ffffff; stroke-width: 2.5; }
      .guide { stroke: #b91c1c; stroke-width: 2; stroke-dasharray: 8 8; }
      .label { font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif; font-size: 18px; fill: #1f2937; }
      .small { font-size: 15px; fill: #475569; }
      .tick { font-size: 16px; fill: #475569; }
      .callout { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="920" height="560" rx="18" />

  <!-- Plot area -->
  <g>
    <line class="grid" x1="90" y1="480" x2="880" y2="480" />
    <line class="grid" x1="90" y1="370" x2="880" y2="370" />
    <line class="grid" x1="90" y1="260" x2="880" y2="260" />
    <line class="grid" x1="90" y1="150" x2="880" y2="150" />
    <line class="grid" x1="90" y1="40" x2="880" y2="40" />

    <line class="grid" x1="90" y1="40" x2="90" y2="480" />
    <line class="grid" x1="287.5" y1="40" x2="287.5" y2="480" />
    <line class="grid" x1="485" y1="40" x2="485" y2="480" />
    <line class="grid" x1="682.5" y1="40" x2="682.5" y2="480" />
    <line class="grid" x1="880" y1="40" x2="880" y2="480" />

    <line class="axis" x1="90" y1="480" x2="880" y2="480" />
    <line class="axis" x1="90" y1="480" x2="90" y2="40" />

    <line class="guide" x1="485" y1="40" x2="485" y2="480" />

    <polyline
      class="curve"
      points="90.00,480.00 97.90,444.45 105.80,417.77 113.70,394.47 121.60,373.39 129.50,353.99 137.40,335.92 145.30,318.99 153.20,303.04 161.10,287.95 169.00,273.64 176.90,260.04 184.80,247.08 192.70,234.73 200.60,222.93 208.50,211.67 216.40,200.90 224.30,190.61 232.20,180.77 240.10,171.35 248.00,162.35 255.90,153.75 263.80,145.53 271.70,137.68 279.60,130.18 287.50,123.04 295.40,116.23 303.30,109.76 311.20,103.60 319.10,97.76 327.00,92.23 334.90,87.00 342.80,82.07 350.70,77.43 358.60,73.08 366.50,69.01 374.40,65.22 382.30,61.70 390.20,58.46 398.10,55.49 406.00,52.78 413.90,50.34 421.80,48.16 429.70,46.24 437.60,44.58 445.50,43.18 453.40,42.03 461.30,41.14 469.20,40.51 477.10,40.13 485.00,40.00 492.90,40.13 500.80,40.51 508.70,41.14 516.60,42.03 524.50,43.18 532.40,44.58 540.30,46.24 548.20,48.16 556.10,50.34 564.00,52.78 571.90,55.49 579.80,58.46 587.70,61.70 595.60,65.22 603.50,69.01 611.40,73.08 619.30,77.43 627.20,82.07 635.10,87.00 643.00,92.23 650.90,97.76 658.80,103.60 666.70,109.76 674.60,116.23 682.50,123.04 690.40,130.18 698.30,137.68 706.20,145.53 714.10,153.75 722.00,162.35 729.90,171.35 737.80,180.77 745.70,190.61 753.60,200.90 761.50,211.67 769.40,222.93 777.30,234.73 785.20,247.08 793.10,260.04 801.00,273.64 808.90,287.95 816.80,303.04 824.70,318.99 832.60,335.92 840.50,353.99 848.40,373.39 856.30,394.47 864.20,417.77 872.10,444.45 880.00,480.00" />

    <circle class="dot" cx="169" cy="273.64" r="5" />
    <circle class="dot" cx="248" cy="162.35" r="5" />
    <circle class="dot" cx="327" cy="92.23" r="5" />
    <circle class="dot" cx="406" cy="52.78" r="5" />
    <circle class="peak" cx="485" cy="40" r="6.5" />
    <circle class="dot" cx="564" cy="52.78" r="5" />
    <circle class="dot" cx="643" cy="92.23" r="5" />
    <circle class="dot" cx="722" cy="162.35" r="5" />
    <circle class="dot" cx="801" cy="273.64" r="5" />
  </g>

  <!-- Axis labels -->
  <g class="tick" text-anchor="middle">
    <text x="90" y="508">0.0</text>
    <text x="287.5" y="508">0.25</text>
    <text x="485" y="508">0.5</text>
    <text x="682.5" y="508">0.75</text>
    <text x="880" y="508">1.0</text>
  </g>

  <g class="tick" text-anchor="end">
    <text x="78" y="486">0.0</text>
    <text x="78" y="376">0.25</text>
    <text x="78" y="266">0.5</text>
    <text x="78" y="156">0.75</text>
    <text x="78" y="46">1.0</text>
  </g>

  <text class="label" x="485" y="540" text-anchor="middle">Probability of heads (p)</text>
  <text class="label" x="24" y="260" transform="rotate(-90 24 260)" text-anchor="middle">Entropy H(p) in bits</text>

  <!-- Callouts -->
  <rect class="callout" x="530" y="78" width="256" height="72" />
  <text class="label" x="548" y="106">Maximum uncertainty</text>
  <text class="small" x="548" y="128">At p = 0.5, the coin is fair</text>
  <text class="small" x="548" y="146">and H(p) = 1 bit exactly.</text>

  <rect class="callout" x="110" y="86" width="245" height="66" />
  <text class="label" x="128" y="112">Certainty kills entropy</text>
  <text class="small" x="128" y="134">As p approaches 0 or 1,</text>
  <text class="small" x="128" y="152">the outcome becomes predictable.</text>
</svg>
