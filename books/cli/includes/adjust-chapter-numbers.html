<script>
(function () {
  function adjustNumber(el) {
    const text = el.textContent.trim();
    const parts = text.split('.');
    const chapterNum = Number(parts[0]);
    if (!Number.isNaN(chapterNum) && chapterNum > 1) {
      parts[0] = String(chapterNum - 1);
      el.textContent = parts.join('.');
    }
  }
  document.addEventListener('DOMContentLoaded', function () {
    // Adjust chapter numbers in titles
    document.querySelectorAll('.chapter-number').forEach(adjustNumber);
    // Adjust section numbers in headers
    document.querySelectorAll('.header-section-number').forEach(adjustNumber);
    // Adjust section numbers in TOC
    document.querySelectorAll('.toc-section-number').forEach(adjustNumber);
  });
})();
</script>
