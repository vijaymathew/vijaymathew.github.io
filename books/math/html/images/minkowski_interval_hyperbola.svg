<svg width="100%" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .small-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 500; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(153, 60, 29); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    Special relativity preserves an interval, not ordinary distance
  </text>
  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    Light sits on the 45-degree boundaries, and constant interval curves replace Euclidean circles
  </text>

  <g>
    <rect x="58" y="108" width="864" height="390" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <g>
      <line x1="160" y1="418" x2="544" y2="418" stroke="rgb(61, 61, 58)" stroke-width="1.3" stroke-linecap="round" marker-end="url(#arrow)"/>
      <line x1="214" y1="472" x2="214" y2="148" stroke="rgb(61, 61, 58)" stroke-width="1.3" stroke-linecap="round" marker-end="url(#arrow)"/>
      <text x="550" y="436" class="body">x</text>
      <text x="194" y="146" class="body">ct</text>

      <line x1="214" y1="418" x2="470" y2="162" stroke="#993C1D" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="214" y1="418" x2="470" y2="418" transform="rotate(-45 214 418)" stroke="#993C1D" stroke-width="2.4" stroke-linecap="round"/>

      <text x="418" y="192" class="label-orange">light: ct = x</text>
      <text x="350" y="446" class="label-orange">light: ct = -x</text>

      <path d="M214 174 C264 198 302 246 326 310 C342 350 352 390 356 418" fill="none" stroke="#185FA5" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M214 174 C164 198 126 246 102 310 C86 350 76 390 72 418" transform="translate(284 0) scale(-1 1)" fill="none" stroke="#185FA5" stroke-width="2.8" stroke-linecap="round"/>

      <circle cx="322" cy="284" r="4" fill="rgb(20, 20, 19)"/>
      <line x1="322" y1="284" x2="322" y2="418" stroke="rgba(31, 30, 29, 0.20)" stroke-width="1.1" stroke-dasharray="5 4"/>
      <line x1="322" y1="284" x2="214" y2="284" stroke="rgba(31, 30, 29, 0.20)" stroke-width="1.1" stroke-dasharray="5 4"/>

      <text x="332" y="278" class="label-green">P</text>
      <text x="258" y="276" class="label-blue">ct</text>
      <text x="264" y="438" class="label-blue">x</text>
      <text x="344" y="236" class="label-blue">constant s^2 &gt; 0</text>

      <text x="126" y="170" class="body">origin event</text>
      <circle cx="214" cy="418" r="4" fill="rgb(20, 20, 19)"/>
    </g>

    <g>
      <rect x="586" y="144" width="286" height="154" rx="8" fill="white" fill-opacity="0.96" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
      <text x="729" y="172" text-anchor="middle" class="subtitle">the invariant interval</text>
      <text x="729" y="212" text-anchor="middle" class="label-blue">s^2 = c^2 t^2 - x^2</text>
      <text x="729" y="238" text-anchor="middle" class="body">In 1+1 dimensions, time and space enter with opposite signs.</text>
      <text x="729" y="262" text-anchor="middle" class="body">The geometry is not Euclidean with one more axis added.</text>
    </g>

    <g>
      <rect x="586" y="320" width="286" height="138" rx="8" fill="white" fill-opacity="0.96" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
      <text x="729" y="348" text-anchor="middle" class="subtitle">why light matters</text>
      <text x="729" y="382" text-anchor="middle" class="label-orange">for light, s^2 = 0</text>
      <text x="729" y="408" text-anchor="middle" class="body">Every inertial observer preserves the same light boundary.</text>
      <text x="729" y="432" text-anchor="middle" class="body">Different coordinates, same interval structure.</text>
    </g>
  </g>

  <rect x="160" y="516" width="660" height="34" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
  <text x="490" y="537" text-anchor="middle" class="small-blue">
    Lorentz transformations preserve interval the way rotations preserve distance
  </text>
</svg>
