<svg width="100%" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(99, 56, 6); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-red { fill: rgb(113, 43, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    Why errors form a bell
  </text>

  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    Many tiny disturbances usually partly cancel
  </text>

  <text x="560" y="78" dominant-baseline="central" class="subtitle">
    The total errors cluster near zero and thin out toward the extremes
  </text>

  <!-- Left panel -->
  <g>
    <rect x="48" y="100" width="410" height="380" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <line x1="96" y1="384" x2="404" y2="384" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="413" y="398" class="body">error axis</text>

    <line x1="250" y1="374" x2="250" y2="394" stroke="rgb(61, 61, 58)" stroke-width="1.2"/>
    <text x="250" y="410" text-anchor="middle" class="body">0</text>

    <line x1="250" y1="384" x2="282" y2="384" stroke="#185FA5" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="286" y="370" class="label-blue">small net error</text>

    <line x1="134" y1="174" x2="230" y2="214" stroke="#0F6E56" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="106" y="168" class="label-green">hand tremor</text>

    <line x1="378" y1="174" x2="292" y2="212" stroke="#BA7517" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="330" y="160" class="label-orange">lens blur</text>

    <line x1="142" y1="258" x2="222" y2="278" stroke="#993C1D" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="104" y="252" class="label-red">air ripple</text>

    <line x1="374" y1="258" x2="300" y2="280" stroke="#185FA5" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="316" y="244" class="label-blue">misalignment</text>

    <line x1="150" y1="326" x2="236" y2="334" stroke="#0F6E56" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="108" y="320" class="label-green">rounding</text>

    <line x1="366" y1="326" x2="286" y2="336" stroke="#BA7517" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="302" y="314" class="label-orange">timing slip</text>

    <circle cx="250" cy="384" r="4" fill="rgb(20, 20, 19)"/>
    <circle cx="282" cy="384" r="4" fill="rgb(20, 20, 19)"/>

    <rect x="84" y="118" width="338" height="54" rx="8" fill="white" fill-opacity="0.94" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="253" y="139" text-anchor="middle" class="subtitle">one observed error is usually a sum</text>
    <text x="253" y="159" text-anchor="middle" class="label-blue">many small pushes point both ways, so the total often stays near zero</text>
  </g>

  <!-- Right panel -->
  <g>
    <rect x="522" y="100" width="410" height="380" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <line x1="566" y1="404" x2="878" y2="404" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="578" y1="420" x2="578" y2="154" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="887" y="418" class="body">error size</text>
    <text x="562" y="152" class="body">frequency</text>

    <path d="M602 404
             C636 400, 662 390, 686 360
             C710 324, 734 234, 750 214
             C766 194, 790 194, 806 214
             C822 234, 846 324, 870 360
             C894 390, 920 400, 952 404"
          transform="translate(-36,0)"
          fill="none" stroke="#185FA5" stroke-width="2.8" stroke-linecap="round"/>

    <path d="M566 404
             C600 400, 626 390, 650 360
             C674 324, 698 234, 714 214
             C730 194, 754 194, 770 214
             C786 234, 810 324, 834 360
             C858 390, 884 400, 918 404
             L918 404 L566 404 Z"
          fill="#E1F5EE" stroke="none" opacity="0.95"/>

    <line x1="742" y1="404" x2="742" y2="206" stroke="rgba(31, 30, 29, 0.22)" stroke-width="1.2" stroke-dasharray="5 4"/>
    <text x="742" y="420" text-anchor="middle" class="body">0</text>

    <line x1="658" y1="404" x2="658" y2="320" stroke="rgba(31, 30, 29, 0.16)" stroke-width="1"/>
    <line x1="826" y1="404" x2="826" y2="320" stroke="rgba(31, 30, 29, 0.16)" stroke-width="1"/>

    <text x="706" y="244" text-anchor="middle" class="label-green">small errors are common</text>
    <text x="640" y="348" text-anchor="middle" class="label-orange">large</text>
    <text x="640" y="364" text-anchor="middle" class="label-orange">errors</text>
    <text x="640" y="380" text-anchor="middle" class="body">rare</text>

    <text x="844" y="348" text-anchor="middle" class="label-orange">large</text>
    <text x="844" y="364" text-anchor="middle" class="label-orange">errors</text>
    <text x="844" y="380" text-anchor="middle" class="body">rare</text>

    <rect x="560" y="118" width="334" height="54" rx="8" fill="white" fill-opacity="0.94" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="727" y="139" text-anchor="middle" class="subtitle">the normal distribution</text>
    <text x="727" y="159" text-anchor="middle" class="label-blue">density proportional to e^(-x^2): sharply peaked near zero, thin in the tails</text>
  </g>

  <rect x="188" y="508" width="604" height="38" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
  <text x="490" y="531" text-anchor="middle" class="label-blue">
    many tiny independent disturbances usually cancel partly; huge one-sided totals are much rarer
  </text>
</svg>
