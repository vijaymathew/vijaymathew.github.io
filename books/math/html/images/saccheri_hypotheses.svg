<svg width="100%" viewBox="0 0 980 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(99, 56, 6); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-red { fill: rgb(113, 43, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    Saccheri's three hypotheses
  </text>

  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    Start with equal sides erected at right angles to a base, then ask what the top angles can be
  </text>

  <!-- Left panel: obtuse -->
  <g>
    <rect x="48" y="104" width="280" height="430" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
    <text x="188" y="132" text-anchor="middle" class="subtitle">obtuse hypothesis</text>

    <line x1="102" y1="404" x2="274" y2="404" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="122" y1="404" x2="138" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="254" y1="404" x2="238" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="138" y1="236" x2="238" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>

    <path d="M129 404 A11 11 0 0 1 118 393" fill="none" stroke="#185FA5" stroke-width="1.8"/>
    <path d="M247 404 A11 11 0 0 0 258 393" fill="none" stroke="#185FA5" stroke-width="1.8"/>
    <text x="114" y="392" class="label-blue">90°</text>
    <text x="262" y="392" class="label-blue">90°</text>

    <path d="M148 236 A16 16 0 0 1 130 224" fill="none" stroke="#993C1D" stroke-width="1.8"/>
    <path d="M228 236 A16 16 0 0 0 246 224" fill="none" stroke="#993C1D" stroke-width="1.8"/>
    <text x="116" y="218" class="label-red">&gt; 90°</text>
    <text x="248" y="218" class="label-red">&gt; 90°</text>

    <text x="188" y="458" text-anchor="middle" class="label-red">top angles open inward</text>
    <text x="188" y="476" text-anchor="middle" class="body">the sides lean toward one another</text>
    <text x="188" y="494" text-anchor="middle" class="body">this corresponds roughly to no parallels</text>
  </g>

  <!-- Middle panel: right -->
  <g>
    <rect x="350" y="104" width="280" height="430" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
    <text x="490" y="132" text-anchor="middle" class="subtitle">right-angle hypothesis</text>

    <line x1="404" y1="404" x2="576" y2="404" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="424" y1="404" x2="424" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="556" y1="404" x2="556" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="424" y1="236" x2="556" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>

    <rect x="418" y="398" width="10" height="10" fill="none" stroke="#185FA5" stroke-width="1"/>
    <rect x="552" y="398" width="10" height="10" fill="none" stroke="#185FA5" stroke-width="1"/>
    <rect x="418" y="236" width="10" height="10" fill="none" stroke="#0F6E56" stroke-width="1"/>
    <rect x="552" y="236" width="10" height="10" fill="none" stroke="#0F6E56" stroke-width="1"/>

    <text x="490" y="458" text-anchor="middle" class="label-green">all four angles are right angles</text>
    <text x="490" y="476" text-anchor="middle" class="body">this is the Euclidean case</text>
    <text x="490" y="494" text-anchor="middle" class="body">the quadrilateral becomes a rectangle</text>
  </g>

  <!-- Right panel: acute -->
  <g>
    <rect x="652" y="104" width="280" height="430" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
    <text x="792" y="132" text-anchor="middle" class="subtitle">acute hypothesis</text>

    <line x1="706" y1="404" x2="878" y2="404" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="726" y1="404" x2="700" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="858" y1="404" x2="884" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="700" y1="236" x2="884" y2="236" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>

    <path d="M733 404 A11 11 0 0 1 722 393" fill="none" stroke="#185FA5" stroke-width="1.8"/>
    <path d="M851 404 A11 11 0 0 0 862 393" fill="none" stroke="#185FA5" stroke-width="1.8"/>
    <text x="718" y="392" class="label-blue">90°</text>
    <text x="866" y="392" class="label-blue">90°</text>

    <path d="M713 236 A16 16 0 0 1 699 248" fill="none" stroke="#BA7517" stroke-width="1.8"/>
    <path d="M871 236 A16 16 0 0 0 885 248" fill="none" stroke="#BA7517" stroke-width="1.8"/>
    <text x="686" y="258" class="label-orange">&lt; 90°</text>
    <text x="888" y="258" class="label-orange">&lt; 90°</text>

    <text x="792" y="458" text-anchor="middle" class="label-orange">top angles open outward</text>
    <text x="792" y="476" text-anchor="middle" class="body">the sides diverge as you go up</text>
    <text x="792" y="494" text-anchor="middle" class="body">the farther you go, the more room there is</text>
  </g>

  <rect x="178" y="566" width="624" height="34" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
  <text x="490" y="587" text-anchor="middle" class="label-blue">
    Saccheri hoped the obtuse and acute cases would collapse; instead the acute case pointed toward a coherent new geometry
  </text>
</svg>
