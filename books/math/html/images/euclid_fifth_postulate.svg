<svg width="100%" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(99, 56, 6); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-red { fill: rgb(113, 43, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    Euclid's fifth postulate
  </text>

  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    Original form: if the interior angles on one side add to less than two right angles, the lines meet on that side
  </text>

  <text x="60" y="90" dominant-baseline="central" class="subtitle">
    Later equivalent form: through an external point, exactly one parallel
  </text>

  <!-- Left panel -->
  <g>
    <rect x="48" y="100" width="410" height="380" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <!-- Two lines that meet on the right -->
    <line x1="84" y1="174" x2="404" y2="302" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="84" y1="382" x2="404" y2="302" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="404" cy="302" r="4" fill="rgb(20, 20, 19)"/>
    <text x="414" y="294" class="body">meet here</text>

    <!-- transversal -->
    <line x1="174" y1="120" x2="278" y2="444" stroke="#185FA5" stroke-width="2.6" stroke-linecap="round"/>
    <text x="156" y="132" class="label-blue">transversal</text>

    <!-- intersections -->
    <circle cx="213.35" cy="225.34" r="3.5" fill="rgb(20, 20, 19)"/>
    <circle cx="244.43" cy="341.89" r="3.5" fill="rgb(20, 20, 19)"/>

    <!-- highlighted side -->
    <path d="M219 231 A30 30 0 0 1 238 246" fill="none" stroke="#BA7517" stroke-width="2"/>
    <path d="M230 320 A36 36 0 0 0 260 338" fill="none" stroke="#0F6E56" stroke-width="2"/>
    <text x="239" y="251" class="label-orange">α</text>
    <text x="266" y="338" class="label-green">β</text>

    <text x="282" y="242" class="label-orange">interior angle</text>
    <text x="300" y="258" class="body">on this side</text>
    <text x="286" y="356" class="label-green">interior angle</text>
    <text x="302" y="372" class="body">on the same side</text>

    <line x1="308" y1="286" x2="370" y2="286" stroke="#993C1D" stroke-width="1.6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="308" y="274" class="label-red">α + β &lt; 180°</text>

    <rect x="84" y="118" width="338" height="54" rx="8" fill="white" fill-opacity="0.94" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="253" y="139" text-anchor="middle" class="subtitle">Euclid's original wording</text>
    <text x="253" y="159" text-anchor="middle" class="label-blue">less than two right angles on one side means the lines eventually meet there</text>

    <rect x="100" y="414" width="306" height="40" rx="8" fill="#FAEEDA" stroke="rgba(31, 30, 29, 0.10)" stroke-width="0.5"/>
    <text x="253" y="438" text-anchor="middle" class="label-orange">
      the postulate talks about what happens far away, not just locally
    </text>
  </g>

  <!-- Right panel -->
  <g>
    <rect x="522" y="100" width="410" height="380" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <line x1="578" y1="334" x2="884" y2="334" stroke="rgb(61, 61, 58)" stroke-width="2.4" stroke-linecap="round"/>
    <text x="820" y="328" class="body">given line l</text>

    <circle cx="720" cy="220" r="3.8" fill="rgb(20, 20, 19)"/>
    <text x="732" y="214" class="body">P</text>

    <line x1="594" y1="220" x2="860" y2="220" stroke="#0F6E56" stroke-width="2.8" stroke-linecap="round"/>

    <line x1="612" y1="188" x2="812" y2="334" stroke="#185FA5" stroke-width="2" stroke-dasharray="7 5" stroke-linecap="round"/>
    <line x1="646" y1="152" x2="752" y2="334" stroke="#BA7517" stroke-width="2" stroke-dasharray="7 5" stroke-linecap="round"/>
    <text x="680" y="196" class="body">other lines through P would meet l if extended</text>

    <path d="M732 248 L726 260 L738 260" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="742" y="262" class="body">not parallel</text>

    <rect x="560" y="118" width="334" height="54" rx="8" fill="white" fill-opacity="0.94" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="727" y="139" text-anchor="middle" class="subtitle">the school version</text>
    <text x="727" y="159" text-anchor="middle" class="label-blue">through a point not on a line, exactly one non-intersecting line can be drawn</text>

    <rect x="582" y="394" width="292" height="40" rx="8" fill="#E1F5EE" stroke="rgba(31, 30, 29, 0.10)" stroke-width="0.5"/>
    <text x="728" y="418" text-anchor="middle" class="label-green">
      this cleaner version is equivalent to Euclid's awkward original statement
    </text>
  </g>

  <rect x="180" y="508" width="620" height="38" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
  <text x="490" y="531" text-anchor="middle" class="label-blue">
    the fifth postulate is unusual because it links a local angle condition to what happens after lines are extended indefinitely
  </text>
</svg>
