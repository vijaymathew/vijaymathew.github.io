<svg width="100%" viewBox="0 0 980 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(99, 56, 6); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-red { fill: rgb(113, 43, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    Derivative and integral: the two core ideas of calculus
  </text>

  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    Derivative - shrink an average slope down to one instant
  </text>

  <text x="560" y="78" dominant-baseline="central" class="subtitle">
    Integral - add many tiny slices to recover a total
  </text>

  <!-- Left panel -->
  <g>
    <rect x="48" y="100" width="410" height="430" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <line x1="92" y1="462" x2="404" y2="462" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="104" y1="478" x2="104" y2="146" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="413" y="476" class="body">t</text>
    <text x="88" y="144" class="body">x</text>

    <path d="M118 430 C170 392, 220 320, 266 272 C304 232, 344 206, 392 184" fill="none" stroke="#185FA5" stroke-width="2.6" stroke-linecap="round"/>

    <circle cx="266" cy="272" r="4" fill="rgb(20, 20, 19)"/>
    <circle cx="356" cy="199" r="4" fill="rgb(20, 20, 19)"/>
    <circle cx="320" cy="226" r="4" fill="rgb(20, 20, 19)"/>

    <line x1="266" y1="272" x2="356" y2="199" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="266" y1="272" x2="320" y2="226" stroke="#0F6E56" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="184" y1="338" x2="380" y2="180" stroke="#993C1D" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="7 5"/>

    <text x="363" y="194" class="label-orange">Q1</text>
    <text x="326" y="220" class="label-green">Q2</text>
    <text x="252" y="289" class="body">P</text>

    <text x="314" y="167" class="label-red">tangent at P</text>
    <text x="314" y="184" class="body">instantaneous slope</text>

    <text x="302" y="246" class="label-green">smaller interval</text>
    <text x="292" y="262" class="body">average slope closer to the tangent</text>

    <text x="310" y="286" class="label-orange">larger interval</text>
    <text x="301" y="302" class="body">average slope over a longer stretch</text>

    <line x1="266" y1="486" x2="320" y2="486" stroke="#0F6E56" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="266" y1="481" x2="266" y2="491" stroke="#0F6E56" stroke-width="1.4"/>
    <line x1="320" y1="481" x2="320" y2="491" stroke="#0F6E56" stroke-width="1.4"/>
    <text x="293" y="503" text-anchor="middle" class="label-green">smaller dt</text>

    <line x1="266" y1="518" x2="356" y2="518" stroke="#BA7517" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="266" y1="513" x2="266" y2="523" stroke="#BA7517" stroke-width="1.4"/>
    <line x1="356" y1="513" x2="356" y2="523" stroke="#BA7517" stroke-width="1.4"/>
    <text x="311" y="535" text-anchor="middle" class="label-orange">larger dt</text>

    <rect x="86" y="118" width="334" height="54" rx="8" fill="white" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="253" y="139" text-anchor="middle" class="subtitle">what the derivative means</text>
    <text x="253" y="159" text-anchor="middle" class="label-blue">average slope Δx/Δt becomes instantaneous slope dx/dt</text>
  </g>

  <!-- Right panel -->
  <g>
    <rect x="522" y="100" width="410" height="430" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <line x1="566" y1="462" x2="878" y2="462" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="578" y1="478" x2="578" y2="146" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="887" y="476" class="body">x</text>
    <text x="562" y="144" class="body">y</text>

    <path d="M592 428 C640 390, 686 300, 726 244 C768 184, 816 176, 866 224" fill="none" stroke="#185FA5" stroke-width="2.6" stroke-linecap="round"/>

    <path d="M640 462 L640 388 C658 370, 676 342, 694 312 C712 280, 730 238, 748 214 C766 191, 784 180, 802 181 C820 182, 838 193, 856 214 L856 462 Z" fill="#E1F5EE" stroke="none" opacity="0.95"/>

    <rect x="640" y="462" width="24" height="-74" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <rect x="664" y="462" width="24" height="-111" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <rect x="688" y="462" width="24" height="-150" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <rect x="712" y="462" width="24" height="-194" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <rect x="736" y="462" width="24" height="-239" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <rect x="760" y="462" width="24" height="-277" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <rect x="784" y="462" width="24" height="-281" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <rect x="808" y="462" width="24" height="-265" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <rect x="832" y="462" width="24" height="-229" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>

    <path d="M592 428 C640 390, 686 300, 726 244 C768 184, 816 176, 866 224" fill="none" stroke="#185FA5" stroke-width="2.6" stroke-linecap="round"/>

    <line x1="640" y1="462" x2="640" y2="388" stroke="#0F6E56" stroke-width="1.4"/>
    <line x1="664" y1="462" x2="664" y2="351" stroke="#0F6E56" stroke-width="1.2" opacity="0.6"/>
    <line x1="688" y1="462" x2="688" y2="312" stroke="#0F6E56" stroke-width="1.2" opacity="0.6"/>
    <line x1="712" y1="462" x2="712" y2="268" stroke="#0F6E56" stroke-width="1.2" opacity="0.6"/>
    <line x1="736" y1="462" x2="736" y2="223" stroke="#0F6E56" stroke-width="1.2" opacity="0.6"/>
    <line x1="760" y1="462" x2="760" y2="185" stroke="#0F6E56" stroke-width="1.2" opacity="0.6"/>
    <line x1="784" y1="462" x2="784" y2="181" stroke="#0F6E56" stroke-width="1.2" opacity="0.6"/>
    <line x1="808" y1="462" x2="808" y2="197" stroke="#0F6E56" stroke-width="1.2" opacity="0.6"/>
    <line x1="832" y1="462" x2="832" y2="233" stroke="#0F6E56" stroke-width="1.2" opacity="0.6"/>

    <line x1="640" y1="470" x2="856" y2="470" stroke="#185FA5" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="640" y1="466" x2="640" y2="474" stroke="#185FA5" stroke-width="1.4"/>
    <line x1="856" y1="466" x2="856" y2="474" stroke="#185FA5" stroke-width="1.4"/>
    <text x="748" y="490" text-anchor="middle" class="label-blue">interval from a to b</text>

    <line x1="736" y1="448" x2="760" y2="448" stroke="#0F6E56" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="736" y1="444" x2="736" y2="452" stroke="#0F6E56" stroke-width="1.4"/>
    <line x1="760" y1="444" x2="760" y2="452" stroke="#0F6E56" stroke-width="1.4"/>
    <text x="748" y="433" text-anchor="middle" class="label-green">tiny dx</text>

    <text x="820" y="300" class="label-green">one thin slice</text>
    <text x="820" y="317" class="body">area approximately y dx</text>

    <rect x="560" y="118" width="334" height="54" rx="8" fill="white" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="727" y="139" text-anchor="middle" class="subtitle">what the integral means</text>
    <text x="727" y="159" text-anchor="middle" class="label-blue">sum many tiny areas to recover the whole area under the curve</text>
  </g>

  <rect x="178" y="558" width="620" height="38" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
  <text x="488" y="581" text-anchor="middle" class="label-blue">
    differentiation asks for the local slope; integration asks for the accumulated total
  </text>
</svg>
