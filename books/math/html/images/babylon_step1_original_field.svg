<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">

<!-- W×W square region -->
<rect x="80" y="50" width="180" height="160" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5" style="fill:rgb(225, 245, 238);stroke:rgb(15, 110, 86);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Extra strip of width 7 -->
<rect x="260" y="50" width="100" height="160" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5" style="fill:rgb(250, 238, 218);stroke:rgb(186, 117, 23);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

