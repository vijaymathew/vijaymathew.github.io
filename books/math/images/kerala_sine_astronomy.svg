<svg width="100%" viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="50" y="38" dominant-baseline="central" style="fill:rgb(20, 20, 19);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:16px;font-weight:500;">
    Why accurate sine values mattered in Kerala astronomy
  </text>

  <text x="50" y="70" dominant-baseline="central" style="fill:rgb(20, 20, 19);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">
    Step 1 - an angle in a circle creates a right triangle
  </text>

  <text x="560" y="70" dominant-baseline="central" style="fill:rgb(20, 20, 19);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">
    Step 2 - astronomy needs sine values for arbitrary angles
  </text>

  <!-- Left panel -->
  <g>
    <circle cx="240" cy="260" r="140" fill="none" stroke="#185FA5" stroke-width="2"/>
    <line x1="240" y1="260" x2="366.79" y2="200.86" stroke="#0F6E56" stroke-width="2"/>
    <line x1="240" y1="260" x2="366.79" y2="260" stroke="rgb(115, 114, 108)" stroke-width="1.4"/>
    <line x1="366.79" y1="260" x2="366.79" y2="200.86" stroke="#BA7517" stroke-width="2"/>

    <rect x="356" y="250" width="10" height="10" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1"/>

    <path d="M280 260 A40 40 0 0 0 276.4 243.1" fill="none" stroke="#993C1D" stroke-width="1.6"/>
    <text x="289" y="245" dominant-baseline="central" style="fill:rgb(113, 43, 19);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:13px;font-weight:500;">
      θ
    </text>

    <circle cx="240" cy="260" r="3.5" fill="rgb(20, 20, 19)"/>
    <circle cx="366.79" cy="200.86" r="3.5" fill="rgb(20, 20, 19)"/>
    <circle cx="366.79" cy="260" r="3.5" fill="rgb(20, 20, 19)"/>

    <text x="228" y="281" dominant-baseline="central" style="fill:rgb(61, 61, 58);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">
      centre
    </text>

    <text x="302" y="221" dominant-baseline="central" style="fill:rgb(8, 80, 65);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:13px;font-weight:500;">
      radius R
    </text>

    <text x="374" y="232" dominant-baseline="central" style="fill:rgb(99, 56, 6);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:13px;font-weight:500;">
      opposite side
    </text>

    <text x="297" y="279" dominant-baseline="central" style="fill:rgb(61, 61, 58);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">
      adjacent side
    </text>

    <line x1="240" y1="104" x2="240" y2="120" stroke="rgb(61, 61, 58)" stroke-width="1"/>
    <line x1="100" y1="104" x2="380" y2="104" stroke="rgb(61, 61, 58)" stroke-width="1" stroke-linecap="round"/>
    <line x1="100" y1="98" x2="100" y2="110" stroke="rgb(61, 61, 58)" stroke-width="1"/>
    <line x1="380" y1="98" x2="380" y2="110" stroke="rgb(61, 61, 58)" stroke-width="1"/>
    <text x="240" y="92" text-anchor="middle" dominant-baseline="central" style="fill:rgb(61, 61, 58);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">
      known circle radius = R
    </text>

    <rect x="90" y="430" width="320" height="68" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.5"/>
    <text x="250" y="454" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20, 20, 19);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">
      definition of sine
    </text>
    <text x="250" y="478" text-anchor="middle" dominant-baseline="central" style="fill:rgb(12, 68, 124);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">
      sin(θ) = opposite / hypotenuse = opposite / R
    </text>
  </g>

  <!-- Arrow -->
  <line x1="450" y1="255" x2="530" y2="255" stroke="#185FA5" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="490" y="235" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24, 95, 165);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:500;">
    compute sin(θ)
  </text>

  <!-- Right panel -->
  <g>
    <rect x="560" y="100" width="360" height="160" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.5"/>
    <text x="740" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20, 20, 19);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">
      easy angles are not enough
    </text>

    <rect x="582" y="146" width="140" height="30" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <rect x="582" y="176" width="140" height="30" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <rect x="582" y="206" width="140" height="30" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <text x="652" y="161" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8, 80, 65);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:500;">30° -> 1/2</text>
    <text x="652" y="191" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8, 80, 65);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:500;">45° -> √2 / 2</text>
    <text x="652" y="221" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8, 80, 65);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:500;">60° -> √3 / 2</text>

    <rect x="754" y="152" width="144" height="78" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <text x="826" y="174" text-anchor="middle" dominant-baseline="central" style="fill:rgb(99, 56, 6);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:13px;font-weight:500;">
      but astronomers need
    </text>
    <text x="826" y="198" text-anchor="middle" dominant-baseline="central" style="fill:rgb(99, 56, 6);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:15px;font-weight:500;">
      23° 17' 42"
    </text>
    <text x="826" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(99, 56, 6);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">
      and thousands like it
    </text>

    <rect x="560" y="298" width="360" height="150" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.5"/>
    <text x="740" y="324" text-anchor="middle" dominant-baseline="central" style="fill:rgb(20, 20, 19);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">
      why precision matters
    </text>

    <line x1="610" y1="364" x2="705" y2="334" stroke="#185FA5" stroke-width="2" stroke-linecap="round"/>
    <line x1="610" y1="364" x2="705" y2="394" stroke="#993C1D" stroke-width="2" stroke-linecap="round"/>
    <circle cx="610" cy="364" r="3.5" fill="rgb(20, 20, 19)"/>
    <text x="580" y="364" dominant-baseline="central" style="fill:rgb(61, 61, 58);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">
      tiny sine error
    </text>
    <text x="713" y="334" dominant-baseline="central" style="fill:rgb(24, 95, 165);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">
      predicted position
    </text>
    <text x="713" y="394" dominant-baseline="central" style="fill:rgb(113, 43, 19);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">
      true position
    </text>

    <line x1="790" y1="364" x2="878" y2="364" stroke="rgb(115, 114, 108)" stroke-width="1.2" stroke-dasharray="5 4"/>
    <text x="834" y="348" text-anchor="middle" dominant-baseline="central" style="fill:rgb(61, 61, 58);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">
      angular error in the sky
    </text>

    <text x="740" y="422" text-anchor="middle" dominant-baseline="central" style="fill:rgb(12, 68, 124);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:13px;font-weight:500;">
      better sine values -> better planetary and eclipse predictions
    </text>
  </g>
</svg>
