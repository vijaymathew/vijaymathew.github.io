<svg width="100%" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(99, 56, 6); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-red { fill: rgb(113, 43, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    A spherical triangle can have angle sum greater than 180 degrees
  </text>

  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    North Pole plus two equatorial points 90 degrees apart gives three right angles
  </text>

  <g>
    <rect x="58" y="108" width="864" height="390" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <!-- Sphere -->
    <circle cx="360" cy="302" r="150" fill="white" stroke="rgba(31, 30, 29, 0.20)" stroke-width="1.2"/>

    <!-- Equator -->
    <ellipse cx="360" cy="302" rx="150" ry="46" fill="none" stroke="rgba(31, 30, 29, 0.22)" stroke-width="1.4" stroke-dasharray="5 4"/>
    <path d="M210 302 A150 46 0 0 0 510 302" fill="none" stroke="#185FA5" stroke-width="2.6" stroke-linecap="round"/>

    <!-- Meridian to left equator point -->
    <path d="M360 152 Q300 206 286 302" fill="none" stroke="#0F6E56" stroke-width="2.6" stroke-linecap="round"/>
    <!-- Meridian to right equator point -->
    <path d="M360 152 Q420 206 434 302" fill="none" stroke="#0F6E56" stroke-width="2.6" stroke-linecap="round"/>

    <!-- Triangle fill -->
    <path d="M360 152 Q300 206 286 302 A150 46 0 0 1 434 302 Q420 206 360 152 Z"
          fill="#E1F5EE" opacity="0.92" stroke="none"/>
    <path d="M360 152 Q300 206 286 302" fill="none" stroke="#0F6E56" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M360 152 Q420 206 434 302" fill="none" stroke="#0F6E56" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M286 302 A150 46 0 0 1 434 302" fill="none" stroke="#185FA5" stroke-width="2.6" stroke-linecap="round"/>

    <!-- Points -->
    <circle cx="360" cy="152" r="4" fill="rgb(20, 20, 19)"/>
    <circle cx="286" cy="302" r="4" fill="rgb(20, 20, 19)"/>
    <circle cx="434" cy="302" r="4" fill="rgb(20, 20, 19)"/>

    <!-- Right angle markers -->
    <path d="M350 164 L350 176 L362 176" fill="none" stroke="#993C1D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M298 302 L298 290 L310 290" fill="none" stroke="#993C1D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M422 302 L422 290 L410 290" fill="none" stroke="#993C1D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="370" y="146" class="label-red">90°</text>
    <text x="265" y="286" class="label-red">90°</text>
    <text x="440" y="286" class="label-red">90°</text>

    <!-- Labels -->
    <text x="350" y="125" class="label-blue">North Pole</text>
    <text x="232" y="320" class="label-blue">equatorial point</text>
    <text x="418" y="320" class="label-blue">equatorial point</text>
    <text x="245" y="250" class="label-green">meridian</text>
    <text x="430" y="250" class="label-green">meridian</text>    
    <text x="332" y="382" class="label-blue">equator arc</text>

    <text x="280" y="430" class="body">great-circle triangle on a sphere</text>

    <!-- Side explanation -->
    <rect x="580" y="142" width="292" height="132" rx="8" fill="white" fill-opacity="0.94" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="726" y="168" text-anchor="middle" class="subtitle">why each angle is 90 degrees</text>
    <text x="604" y="198" class="label-green">At the equator:</text>
    <text x="604" y="216" class="body">meridians meet the equator at right angles.</text>
    <text x="604" y="244" class="label-green">At the pole:</text>
    <text x="604" y="262" class="body">the two meridians differ by 90 degrees of longitude,</text>
    <text x="604" y="280" class="body">so they meet there at a right angle too.</text>

    <rect x="604" y="320" width="244" height="82" rx="8" fill="#FAEEDA" stroke="rgba(31, 30, 29, 0.10)" stroke-width="0.5"/>
    <text x="726" y="348" text-anchor="middle" class="subtitle">angle sum</text>
    <text x="726" y="372" text-anchor="middle" class="label-orange">90° + 90° + 90° = 270°</text>
    <text x="726" y="392" text-anchor="middle" class="body">impossible in Euclid, natural on a sphere</text>
  </g>

  <rect x="200" y="516" width="580" height="34" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
  <text x="490" y="537" text-anchor="middle" class="label-blue">
    on positively curved space, triangle angle sums can exceed 180 degrees
  </text>
</svg>
