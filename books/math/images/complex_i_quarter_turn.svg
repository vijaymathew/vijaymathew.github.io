<svg width="100%" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(99, 56, 6); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-red { fill: rgb(113, 43, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    Multiplying by i means a quarter-turn
  </text>

  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    On the complex plane, i does not create nonsense: it rotates a point by ninety degrees
  </text>

  <g>
    <rect x="48" y="100" width="590" height="400" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <line x1="122" y1="300" x2="584" y2="300" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="336" y1="468" x2="336" y2="126" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="590" y="316" class="body">real</text>
    <text x="314" y="124" class="body">imaginary</text>

    <circle cx="336" cy="300" r="118" fill="none" stroke="rgba(24, 95, 165, 0.25)" stroke-width="1.8"/>

    <line x1="454" y1="300" x2="454" y2="304" stroke="rgb(61, 61, 58)" stroke-width="1.2"/>
    <line x1="336" y1="182" x2="340" y2="182" stroke="rgb(61, 61, 58)" stroke-width="1.2"/>
    <line x1="218" y1="300" x2="218" y2="304" stroke="rgb(61, 61, 58)" stroke-width="1.2"/>
    <line x1="336" y1="418" x2="340" y2="418" stroke="rgb(61, 61, 58)" stroke-width="1.2"/>

    <text x="452" y="322" text-anchor="middle" class="body">1</text>
    <text x="352" y="186" class="body">i</text>
    <text x="216" y="322" text-anchor="middle" class="body">-1</text>
    <text x="352" y="422" class="body">-i</text>

    <line x1="336" y1="300" x2="440" y2="230" stroke="#185FA5" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="336" y1="300" x2="406" y2="404" stroke="#0F6E56" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

    <line x1="440" y1="230" x2="440" y2="300" stroke="rgba(31, 30, 29, 0.25)" stroke-width="1.2" stroke-dasharray="5 4"/>
    <line x1="336" y1="230" x2="440" y2="230" stroke="rgba(31, 30, 29, 0.25)" stroke-width="1.2" stroke-dasharray="5 4"/>

    <line x1="406" y1="404" x2="406" y2="300" stroke="rgba(31, 30, 29, 0.25)" stroke-width="1.2" stroke-dasharray="5 4"/>
    <line x1="336" y1="404" x2="406" y2="404" stroke="rgba(31, 30, 29, 0.25)" stroke-width="1.2" stroke-dasharray="5 4"/>

    <circle cx="440" cy="230" r="4" fill="rgb(20, 20, 19)"/>
    <circle cx="406" cy="404" r="4" fill="rgb(20, 20, 19)"/>
    <circle cx="336" cy="300" r="3.5" fill="rgb(20, 20, 19)"/>

    <text x="448" y="218" class="label-blue">z = a + bi</text>
    <text x="416" y="424" class="label-green">iz = -b + ai</text>

    <text x="386" y="318" class="label-orange">a</text>
    <text x="448" y="270" class="label-orange">b</text>
    <text x="374" y="424" class="label-orange">-b</text>
    <text x="418" y="344" class="label-orange">a</text>

    <path d="M436 240 A118 118 0 0 1 415 394" fill="none" stroke="#993C1D" stroke-width="2"/>
    <text x="476" y="320" class="label-red">multiply by i</text>
    <text x="476" y="338" class="body">rotate 90 degrees</text>
    <text x="476" y="354" class="body">counterclockwise</text>

    <path d="M432 296 L432 286 L442 286" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="250" y="156" class="label-blue">same distance from the origin</text>
    <text x="250" y="174" class="body">multiplication by i changes direction, not length</text>
  </g>

  <g>
    <rect x="666" y="100" width="266" height="190" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
    <text x="798" y="126" text-anchor="middle" class="subtitle">special case: the roots of x^2 + 1 = 0</text>

    <line x1="710" y1="206" x2="890" y2="206" stroke="rgb(61, 61, 58)" stroke-width="1.1" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="800" y1="266" x2="800" y2="146" stroke="rgb(61, 61, 58)" stroke-width="1.1" stroke-linecap="round" marker-end="url(#arrow)"/>
    <circle cx="800" cy="206" r="46" fill="none" stroke="rgba(24, 95, 165, 0.25)" stroke-width="1.6"/>

    <circle cx="800" cy="160" r="3.5" fill="rgb(20, 20, 19)"/>
    <circle cx="800" cy="252" r="3.5" fill="rgb(20, 20, 19)"/>
    <text x="812" y="164" class="label-blue">i</text>
    <text x="812" y="256" class="label-green">-i</text>

    <text x="798" y="284" text-anchor="middle" class="body">the missing roots lie on the imaginary axis</text>
  </g>

  <g>
    <rect x="666" y="312" width="266" height="188" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
    <text x="798" y="338" text-anchor="middle" class="subtitle">coordinate update</text>

    <text x="716" y="380" class="label-blue">(a, b)</text>
    <text x="768" y="380" class="body">becomes</text>
    <text x="848" y="380" class="label-green">(-b, a)</text>

    <line x1="730" y1="394" x2="866" y2="394" stroke="#993C1D" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="798" y="418" text-anchor="middle" class="body">swap the coordinates and flip the old vertical part</text>

    <rect x="694" y="440" width="208" height="38" rx="8" fill="#E9F3FB" stroke="rgba(31, 30, 29, 0.10)" stroke-width="0.5"/>
    <text x="798" y="464" text-anchor="middle" class="label-blue">i(a + bi) = -b + ai</text>
  </g>
</svg>
