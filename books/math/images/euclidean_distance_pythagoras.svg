<svg width="100%" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(99, 56, 6); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    Euclidean distance is Pythagoras written in coordinates
  </text>
  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    The invariant distance comes from adding squared displacements along perpendicular axes
  </text>

  <g>
    <rect x="58" y="108" width="864" height="390" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <g>
      <line x1="138" y1="420" x2="516" y2="420" stroke="rgb(61, 61, 58)" stroke-width="1.3" stroke-linecap="round" marker-end="url(#arrow)"/>
      <line x1="180" y1="462" x2="180" y2="138" stroke="rgb(61, 61, 58)" stroke-width="1.3" stroke-linecap="round" marker-end="url(#arrow)"/>
      <text x="522" y="438" class="body">x</text>
      <text x="160" y="136" class="body">y</text>

      <line x1="180" y1="420" x2="420" y2="420" stroke="#0F6E56" stroke-width="3" stroke-linecap="round"/>
      <line x1="420" y1="420" x2="420" y2="228" stroke="#185FA5" stroke-width="3" stroke-linecap="round"/>
      <line x1="180" y1="420" x2="420" y2="228" stroke="#993C1D" stroke-width="3" stroke-linecap="round"/>

      <path d="M406 420 L406 406 L420 406" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.2" stroke-linejoin="round"/>

      <circle cx="180" cy="420" r="4" fill="rgb(20, 20, 19)"/>
      <circle cx="420" cy="228" r="4" fill="rgb(20, 20, 19)"/>

      <line x1="420" y1="228" x2="180" y2="228" stroke="rgba(31, 30, 29, 0.20)" stroke-width="1.1" stroke-dasharray="5 4"/>
      <line x1="420" y1="228" x2="420" y2="420" stroke="rgba(31, 30, 29, 0.20)" stroke-width="1.1" stroke-dasharray="5 4"/>

      <text x="430" y="222" class="label-blue">P</text>
      <text x="288" y="440" class="label-green">dx</text>
      <text x="430" y="330" class="label-blue">dy</text>
      <text x="286" y="312" class="label-orange">ds</text>

      <text x="210" y="170" class="label-blue">Move dx across and dy up</text>
      <text x="210" y="188" class="body">The diagonal displacement is the actual distance.</text>
      <text x="210" y="206" class="body">Its square is the sum of the two squared legs.</text>
    </g>

    <g>
      <rect x="584" y="148" width="282" height="140" rx="8" fill="white" fill-opacity="0.96" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
      <text x="725" y="176" text-anchor="middle" class="subtitle">plane formula</text>
      <text x="725" y="216" text-anchor="middle" class="label-blue">ds^2 = dx^2 + dy^2</text>
      <text x="725" y="246" text-anchor="middle" class="body">Pythagoras survives every rotation of the axes.</text>
    </g>

    <g>
      <rect x="584" y="316" width="282" height="140" rx="8" fill="white" fill-opacity="0.96" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
      <text x="725" y="344" text-anchor="middle" class="subtitle">three-dimensional version</text>
      <text x="725" y="384" text-anchor="middle" class="label-green">ds^2 = dx^2 + dy^2 + dz^2</text>
      <text x="725" y="414" text-anchor="middle" class="body">A new perpendicular direction adds one more squared term.</text>
    </g>
  </g>

  <rect x="180" y="516" width="620" height="34" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
  <text x="490" y="537" text-anchor="middle" class="label-blue">
    Euclidean geometry is organized around a distance that all rotated coordinate systems preserve
  </text>
</svg>
