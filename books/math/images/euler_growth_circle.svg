<svg width="100%" viewBox="0 0 980 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 500; }
      .subtitle { fill: rgb(20, 20, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
      .body { fill: rgb(61, 61, 58); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-blue { fill: rgb(24, 95, 165); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-green { fill: rgb(8, 80, 65); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-orange { fill: rgb(99, 56, 6); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
      .label-red { fill: rgb(113, 43, 19); font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <text x="60" y="42" dominant-baseline="central" class="title">
    Why circles live inside growth
  </text>

  <text x="60" y="78" dominant-baseline="central" class="subtitle">
    Real exponential: change stays aligned with the quantity
  </text>

  <text x="560" y="78" dominant-baseline="central" class="subtitle">
    Complex exponential: change is quarter-turned, so motion keeps turning
  </text>

  <!-- Left panel -->
  <g>
    <rect x="48" y="100" width="410" height="430" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <line x1="102" y1="452" x2="404" y2="452" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="110" y1="476" x2="110" y2="154" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="412" y="466" class="body">real axis</text>
    <text x="90" y="152" class="body">magnitude</text>

    <line x1="110" y1="452" x2="356" y2="288" stroke="rgba(31, 30, 29, 0.18)" stroke-width="2" stroke-dasharray="7 6" stroke-linecap="round"/>

    <line x1="110" y1="452" x2="256" y2="354" stroke="#185FA5" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="256" y1="354" x2="332" y2="304" stroke="#0F6E56" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="256" y1="354" x2="356" y2="288" stroke="#BA7517" stroke-width="1.8" stroke-linecap="round"/>

    <circle cx="110" cy="452" r="3.5" fill="rgb(20, 20, 19)"/>
    <circle cx="256" cy="354" r="4" fill="rgb(20, 20, 19)"/>
    <circle cx="356" cy="288" r="4" fill="rgb(20, 20, 19)"/>

    <text x="122" y="444" class="body">origin</text>
    <text x="212" y="340" class="label-blue">y</text>
    <text x="235" y="332" class="label-green">dy/dx = y</text>
    <text x="334" y="277" class="label-orange">later state</text>

    <text x="120" y="183" class="label-blue">quantity points one way</text>
    <text x="120" y="201" class="body">the rate of change points the same way</text>

    <text x="226" y="410" class="label-green">aligned change</text>
    <text x="224" y="428" class="body">tip moves outward along one line</text>

    <rect x="88" y="108" width="330" height="46" rx="8" fill="white" fill-opacity="0.94" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="253" y="126" text-anchor="middle" class="subtitle">ordinary exponential growth</text>
    <text x="253" y="144" text-anchor="middle" class="label-blue">dy/dx = y gives y = e^x: same direction, bigger size</text>

    <rect x="92" y="470" width="320" height="40" rx="8" fill="#E9F3FB" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="252" y="494" text-anchor="middle" class="label-blue">
      growth stretches a vector outward when the change is parallel to it
    </text>
  </g>

  <!-- Right panel -->
  <g>
    <rect x="522" y="100" width="410" height="430" rx="10" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>

    <line x1="576" y1="316" x2="878" y2="316" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="726" y1="470" x2="726" y2="154" stroke="rgb(61, 61, 58)" stroke-width="1.2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="886" y="330" class="body">real</text>
    <text x="706" y="152" class="body">imaginary</text>

    <circle cx="726" cy="316" r="126" fill="none" stroke="#185FA5" stroke-width="2.4"/>
    <circle cx="726" cy="316" r="3.5" fill="rgb(20, 20, 19)"/>

    <line x1="726" y1="316" x2="829" y2="242" stroke="#185FA5" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="829" y1="242" x2="776" y2="168" stroke="#0F6E56" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>

    <line x1="829" y1="242" x2="829" y2="316" stroke="rgba(31, 30, 29, 0.28)" stroke-width="1.2" stroke-dasharray="5 4"/>
    <line x1="726" y1="242" x2="829" y2="242" stroke="rgba(31, 30, 29, 0.28)" stroke-width="1.2" stroke-dasharray="5 4"/>

    <path d="M805 249 L798 239 L808 232" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="829" cy="242" r="4" fill="rgb(20, 20, 19)"/>
    <rect x="760" y="212" width="88" height="24" rx="6" fill="#E9F3FB" stroke="rgba(31, 30, 29, 0.10)" stroke-width="0.5"/>
    <text x="804" y="228" text-anchor="middle" class="label-blue">y = e^(ix)</text>
    <text x="795" y="188" class="label-green">dy/dx = iy</text>
    <text x="810" y="205" class="body">turn the change by 90 degrees</text>

    <text x="778" y="334" text-anchor="middle" class="label-orange">cos x</text>
    <text x="850" y="281" class="label-orange">sin x</text>

    <path d="M829 242 A126 126 0 0 0 852 274" fill="none" stroke="#993C1D" stroke-width="1.8"/>
    <text x="858" y="270" class="label-red">x</text>

    <text x="574" y="408" class="label-green">tangent direction</text>
    <text x="574" y="426" class="body">perpendicular change keeps the length fixed</text>

    <rect x="560" y="108" width="334" height="46" rx="8" fill="white" fill-opacity="0.94" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="727" y="126" text-anchor="middle" class="subtitle">turning instead of stretching</text>
    <text x="727" y="144" text-anchor="middle" class="label-blue">dy/dx = iy gives y = e^(ix): same size, changing direction</text>

    <rect x="560" y="452" width="334" height="58" rx="8" fill="#E1F5EE" stroke="rgba(31, 30, 29, 0.12)" stroke-width="0.5"/>
    <text x="727" y="476" text-anchor="middle" class="label-green">
      on the unit circle, the horizontal and vertical pieces are
    </text>
    <text x="727" y="496" text-anchor="middle" class="label-green">
      exactly cos x and sin x
    </text>
  </g>

  <rect x="140" y="560" width="700" height="38" rx="8" fill="rgb(245, 244, 237)" stroke="rgba(31, 30, 29, 0.18)" stroke-width="0.6"/>
  <text x="490" y="583" text-anchor="middle" class="label-blue">
    Euler's formula says circular motion is exponential change whose direction is continuously quarter-turned
  </text>
</svg>
