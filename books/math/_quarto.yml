project:
  type: book
  output-dir: html

book:
  title: "From Clay to Infinity"
  subtitle: "A History of Mathematical Ideas from Sumer to Gödel"
  author: "Vijay Mathew"
  date: today
  date-format: "MMMM D, YYYY"
  chapters:
    - index.md
    - prologue.md
    - part: "Counting, Land, and Proof"
      chapters:
        - chapter_1.md
        - chapter_2.md
        - chapter_3.md
        - chapter_4.md
    - part: "Zero, Algebra, and the Sky"
      chapters:
        - chapter_5.md
        - chapter_6.md
        - chapter_7.md
    - part: "Change, Chance, and New Numbers"
      chapters:
        - chapter_8.md
        - chapter_9.md
        - chapter_10.md
        - chapter_11.md
    - part: "When Mathematics Outruns Intuition"
      chapters:
        - chapter_12.md
        - chapter_13.md
        - chapter_14.md
        - chapter_15.md
        - chapter_16.md
    - epilogue.md
  appendices:
    - bibliography.md

format:
  html:
    theme:
      light: [cosmo, ../nex-book.scss]
      dark: [darkly, ../nex-book.scss]
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    css: styles.css
    code-copy: false
    code-overflow: wrap
    include-after-body: includes/adjust-chapter-numbers.html
  pdf:
    output-file: from-clay-to-infinity.pdf
    pdf-engine: lualatex
    documentclass: scrbook
    classoption:
      - twoside
      - openright
      - headings=normal
      - fontsize=11pt
      - DIV=12
      - BCOR=15mm
      - paper=6in:9in
    number-sections: true
    toc: true
    toc-depth: 2
    papersize: custom
    mainfont: "EB Garamond"
    mainfontoptions:
      - Numbers=OldStyle
      - Ligatures=Common
      - Contextuals=Alternate
    sansfont: "Source Sans 3"
    sansfontoptions:
      - Scale=MatchLowercase
      - Numbers=Lining
    monofont: "Inconsolatazi4"
    monofontoptions:
      - Scale=MatchLowercase
    include-in-header: includes/preamble.tex
    colorlinks: false
    link-citations: true
    keep-tex: false

crossref:
  chapters: true

execute:
  freeze: auto
