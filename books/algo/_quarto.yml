project:
  type: book
  output-dir: html

book:
  title: "Structures of Scale"
  subtitle: "Advanced Algorithms for Modern Systems"
  author: "Vijay Mathew"
  date: today
  date-format: "MMMM D, YYYY"
  chapters:
    - index.md
    - preface.md
    - part: "When Simple Structures Break Down"
      chapters:
        - chapter_1.md
    - part: "Ordered Structures and Probabilistic Thinking"
      chapters:
        - chapter_2.md
        - chapter_3.md
        - chapter_4.md
        - chapter_5.md
        - chapter_6.md
    - part: "String Algorithms"
      chapters:
        - chapter_7.md
        - chapter_8.md
        - chapter_9.md
        - chapter_10.md
        - chapter_11.md
        - chapter_12.md
        - chapter_13.md
        - chapter_14.md
    - part: "Sorting at Scale"
      chapters:
        - chapter_15.md
        - chapter_16.md
    - part: "Concurrency-Aware Structures"
      chapters:
        - chapter_17.md
        - chapter_18.md
        - chapter_19.md
        - chapter_20.md
        - chapter_21.md
  appendices:
    - appendix_a.md
    - appendix_b.md

format:
  html:
    theme:
      light: [cosmo, ../nex-book.scss]
      dark: [darkly, ../nex-book.scss]
    toc: true
    toc-depth: 3
    number-sections: false
    smooth-scroll: true
    link-external-newwindow: true
    css: styles.css
    code-copy: true
    code-overflow: wrap
    include-after-body: includes/adjust-chapter-numbers.html
  pdf:
    output-file: structures-of-scale.pdf
    pdf-engine: lualatex
    documentclass: scrbook
    classoption:
      - twoside
      - openright
      - headings=normal
      - fontsize=11pt
      - DIV=12
      - BCOR=15mm
      - paper=6in:9in
    number-sections: true
    toc: true
    toc-depth: 2
    papersize: custom
    mainfont: "EB Garamond"
    mainfontoptions:
      - Numbers=OldStyle
      - Ligatures=Common
      - Contextuals=Alternate
    sansfont: "Source Sans 3"
    sansfontoptions:
      - Scale=MatchLowercase
      - Numbers=Lining
    monofont: "Inconsolatazi4"
    monofontoptions:
      - Scale=MatchLowercase
    include-in-header: includes/preamble.tex
    colorlinks: false
    link-citations: true
    keep-tex: false

crossref:
  chapters: true

execute:
  freeze: auto
